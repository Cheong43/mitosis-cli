<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CodeCLI – Branching Agent Desktop</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<style>
:root{
  --bg:#f7f3ea;--sb:#f1ebde;--sf:#fffdf8;--sf2:#f4ede1;--bd:#d8cebe;--bds:#e5dccd;
  --tx:#3f352b;--tx2:#2f261d;--dim:#7f7366;--acc:#2f6f8f;--acc2:#dce9ef;
  --ub:#dbeaf2;--ab:#f4ede1;--grn:#5c8b64;--ylw:#c28b2f;--red:#bf5d56;--gray:#8d8072;
  --sbw:260px;--hh:52px;--r:8px;--rs:5px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:"Iowan Old Style","Palatino Linotype","Noto Serif SC","Songti SC",Georgia,serif;font-size:13px;background:var(--bg);color:var(--tx);line-height:1.55}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
textarea{font:inherit;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}

/* ── App shell ── */
#app{display:flex;flex-direction:column;height:100vh}
header{display:flex;align-items:center;height:var(--hh);padding:0 16px;background:var(--sb);border-bottom:1px solid var(--bd);flex-shrink:0;gap:12px;user-select:none}
.h-logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px;color:var(--tx2);white-space:nowrap;width:calc(var(--sbw) - 16px)}
.h-title{flex:1;font-size:13px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-title.on{color:var(--tx2);cursor:text}
.h-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim);white-space:nowrap}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0;transition:background .3s}
.sdot.busy{background:var(--ylw);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:var(--sbw);background:var(--sb);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 8px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}
#btn-new{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:var(--rs);background:var(--acc2);color:var(--acc);font-size:12px;font-weight:500;transition:background .15s,color .15s}
#btn-new:hover{background:var(--acc);color:#fff}
#tlist{flex:1;overflow-y:auto;padding:4px 6px 12px}
.tg-lbl{padding:8px 6px 4px;font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--dim)}
.ti{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:var(--rs);cursor:pointer;transition:background .12s;position:relative}
.ti:hover{background:var(--sf)}
.ti.act{background:var(--sf2)}
.ti-dot{flex-shrink:0;width:7px;height:7px;border-radius:50%;background:var(--dim);margin-top:4px}
.ti.act .ti-dot{background:var(--acc)}
.ti-body{flex:1;min-width:0}
.ti-title{font-size:13px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.ti.act .ti-title{color:var(--tx2)}
.ti-time{font-size:11px;color:var(--dim);margin-top:1px}
.ti-del{display:none;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;color:var(--dim);font-size:13px;flex-shrink:0;margin-top:1px}
.ti:hover .ti-del{display:flex}
.ti-del:hover{background:var(--red);color:#fff}

/* ── Chat area ── */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--dim)}
.empty-icon{font-size:40px;opacity:.45}
#btn-start{padding:8px 20px;border-radius:var(--r);background:var(--acc);color:#fff;font-size:13px;font-weight:500;transition:opacity .15s}
#btn-start:hover{opacity:.85}
#convo{flex:1;overflow-y:auto;padding:24px max(24px,calc(50% - 420px));display:flex;flex-direction:column;gap:0}

/* ── Round card ── */
.round{margin-bottom:36px}
.msg-u{display:flex;justify-content:flex-end;margin-bottom:10px}
.bubble-u{max-width:76%;padding:10px 14px;border-radius:var(--r) var(--r) 2px var(--r);background:var(--ub);color:var(--tx2);font-size:13.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;margin-top:2px}
.av-u{background:var(--acc);color:#fff;margin-left:8px}
.av-a{background:var(--sf2);color:var(--acc);margin-right:10px}
.msg-a{display:flex;align-items:flex-start;margin-bottom:8px}
.bubble-a{flex:1;max-width:calc(100% - 36px)}
.a-name{font-size:11.5px;font-weight:600;color:var(--acc);margin-bottom:4px}
.a-body{font-size:13.5px;color:var(--tx);line-height:1.7;word-break:break-word}
.a-body code{font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:12px;background:var(--sf2);padding:1px 5px;border-radius:3px;color:#875d24}
.a-body pre{background:var(--sf2);border-radius:var(--rs);padding:12px 14px;overflow-x:auto;margin:8px 0}
.a-body pre code{background:none;padding:0;font-size:12.5px;color:var(--tx);line-height:1.55}
.a-body p{margin:4px 0}
.a-body p:first-child{margin-top:0}
.a-body p:last-child{margin-bottom:0}
.a-body h1,.a-body h2,.a-body h3,.a-body h4{color:var(--tx2);margin:12px 0 6px;line-height:1.35}
.a-body h1{font-size:1.3em}.a-body h2{font-size:1.15em}.a-body h3{font-size:1.05em}
.a-body ul,.a-body ol{padding-left:1.6em;margin:6px 0}
.a-body li{margin:2px 0}
.a-body blockquote{border-left:3px solid var(--acc);padding:4px 12px;margin:6px 0;color:var(--dim);background:var(--sf)}
.a-body a{color:var(--acc);text-decoration:none}
.a-body a:hover{text-decoration:underline}
.a-body hr{border:none;border-top:1px solid var(--bd);margin:10px 0}
.a-body table{border-collapse:collapse;margin:8px 0;width:100%}
.a-body th,.a-body td{border:1px solid var(--bd);padding:4px 8px;font-size:12.5px;text-align:left}
.a-body th{background:var(--sf);color:var(--tx2);font-weight:600}
.a-body strong{color:var(--tx2)}
.a-body em{color:var(--dim);font-style:italic}

/* ── Governance approval prompt ── */
.approval-prompt{display:flex;gap:10px;padding:12px 16px;margin:8px 0;background:linear-gradient(135deg,rgba(255,193,7,0.08),rgba(255,152,0,0.08));border:1px solid rgba(255,193,7,0.35);border-radius:var(--rs);animation:approval-in .25s ease-out}
@keyframes approval-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.approval-icon{font-size:22px;flex-shrink:0;padding-top:2px}
.approval-body{flex:1;min-width:0}
.approval-title{font-size:13px;font-weight:700;color:#ffb300;margin-bottom:6px}
.approval-detail{font-size:12.5px;color:var(--tx);margin:2px 0;line-height:1.45}
.approval-detail code{font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:11.5px;background:var(--sf2);padding:1px 5px;border-radius:3px;color:#875d24;word-break:break-all}
.approval-actions{display:flex;gap:8px;margin-top:10px}
.approval-btn{padding:5px 16px;border:none;border-radius:5px;font-size:12.5px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s}
.approval-btn:active{transform:scale(0.96)}
.approval-allow{background:rgba(76,175,80,0.2);color:#66bb6a;border:1px solid rgba(76,175,80,0.4)}
.approval-allow:hover{background:rgba(76,175,80,0.3)}
.approval-deny{background:rgba(244,67,54,0.15);color:#ef5350;border:1px solid rgba(244,67,54,0.35)}
.approval-deny:hover{background:rgba(244,67,54,0.25)}
.approval-resolved{font-size:12px;color:var(--dim);font-style:italic}

/* ── Branch visualization panel ── */
.bp{margin-bottom:12px;border:1px solid var(--bds);border-radius:var(--rs);overflow:hidden}
.bp-hdr{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--sf);cursor:pointer;font-size:12px;color:var(--dim);user-select:none;transition:background .12s}
.bp-hdr:hover{background:var(--sf2)}
.bp-chevron{font-size:10px;transition:transform .2s;flex-shrink:0}
.bp.open .bp-chevron{transform:rotate(90deg)}
.bp-title{font-weight:600;color:var(--tx);font-size:12px}
.bp-meta{flex:1;font-size:11px}
.bp-body{display:none;background:var(--sf)}
.bp.open .bp-body{display:flex;flex-direction:row;align-items:stretch}

/* SVG tree panel */
.bv-svg-wrap{flex:1;min-width:0;overflow:auto;padding:12px;min-height:120px}
.bv-svg-wrap svg{display:block}

/* Branch sidebar list */
.bv-sidebar{width:240px;flex-shrink:0;align-self:stretch;border-left:1px solid var(--bds);overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px;max-height:none}
.bv-node-card{padding:5px 8px;border-radius:var(--rs);border:1px solid var(--bds);background:var(--sf);transition:background .15s,border-color .15s,box-shadow .15s}
.bv-node-card.is-active{box-shadow:0 0 0 1px rgba(63,53,43,.06),0 6px 18px rgba(74,60,41,.10)}
.bv-nc-id{font-size:11px;font-weight:700;font-family:"SFMono-Regular",Consolas,Menlo,monospace}
.bv-nc-lbl{font-size:11px;color:var(--dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bv-nc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.bv-tag{display:inline-flex;align-items:center;padding:1px 6px;border-radius:999px;font-size:10px;line-height:1.5;border:1px solid var(--bds);background:var(--sf2);color:var(--dim)}
.bv-tag.phase{border-color:rgba(47,111,143,.25);color:var(--acc);background:rgba(47,111,143,.08)}
.bv-tag.kind{border-color:rgba(138,95,35,.18);color:#875d24;background:rgba(194,139,47,.08)}
.bv-nc-trace{font-size:10.5px;margin-top:2px;line-height:1.4;color:var(--gray);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Summary row */
.bp-summary{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px;background:var(--sf);border-top:1px solid var(--bds)}
.bp-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10.5px;line-height:1.6;background:var(--sf2);color:var(--dim);border:1px solid var(--bds)}
.bp-chip.phase{font-weight:600}
.bp-note{padding:0 12px 10px;background:var(--sf);color:var(--dim);font-size:11px;line-height:1.55}
.bp-note:empty{display:none}

/* Trace accordion */
.tr-toggle{display:flex;align-items:center;gap:6px;padding:4px 0 5px;font-size:11px;color:var(--dim);cursor:pointer;user-select:none}
.tr-toggle:hover{color:var(--tx)}
.tr-chevron{font-size:9px;transition:transform .2s}
.tr-toggle.open .tr-chevron{transform:rotate(90deg)}
.tr-list{display:none;max-height:200px;overflow-y:auto;margin-bottom:8px;padding:5px 8px;background:var(--sf);border-radius:var(--rs)}
.tr-list.open{display:block}
.te{font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:11px;line-height:1.5;padding:1px 0 1px 6px;border-left:2px solid transparent;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.te.thought{color:#8b949e;border-color:#4d5a66}
.te.action{color:#e3b341;border-color:#b08a20}
.te.observation{color:#58a6ff;border-color:#1f4170}
.te.error{color:#f85149;border-color:#8c1c18}

/* Typing dots */
.typing{display:flex;align-items:flex-start;gap:10px;margin-bottom:24px}
.typing-av{width:26px;height:26px;border-radius:50%;background:var(--sf2);color:var(--acc);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tdots{display:flex;gap:4px;align-items:center;margin-top:8px}
.tdots span{width:7px;height:7px;border-radius:50%;background:var(--dim);animation:blink 1.2s infinite}
.tdots span:nth-child(2){animation-delay:.2s}
.tdots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* ── Input bar ── */
.ibar{flex-shrink:0;padding:12px 24px 16px;background:var(--bg);border-top:1px solid var(--bd)}
.irow{display:flex;gap:8px;align-items:flex-end}
#inp{flex:1;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx2);resize:none;min-height:42px;max-height:130px;overflow-y:auto;font-size:13.5px;line-height:1.55;outline:none;transition:border-color .15s}
#inp::placeholder{color:var(--dim)}
#inp:focus{border-color:var(--acc)}
#inp:disabled{opacity:.5;cursor:not-allowed}
#btn-send{flex-shrink:0;padding:0 16px;height:42px;border-radius:var(--r);background:var(--acc);color:#fff;font-size:13px;font-weight:600;transition:opacity .15s,background .15s;white-space:nowrap}
#btn-send:hover:not(:disabled){opacity:.88}
#btn-send:disabled{background:var(--sf2);color:var(--dim);cursor:not-allowed}
.ihint{font-size:11px;color:var(--dim);margin-top:5px}
.irow-top{display:flex;gap:8px;align-items:center;margin-bottom:6px}
#mode-select{padding:4px 8px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx2);font-size:12px;outline:none;cursor:pointer}
#mode-select:focus{border-color:var(--acc)}
.mode-label{font-size:11px;color:var(--dim);white-space:nowrap}

/* ── Header tab nav ── */
.htabs{display:flex;align-items:center;gap:2px;margin-right:8px}
.htab{padding:5px 14px;border-radius:var(--rs);font-size:12.5px;font-weight:500;color:var(--dim);transition:background .15s,color .15s;white-space:nowrap}
.htab:hover{background:var(--sf2);color:var(--tx)}
.htab.active{background:var(--sf2);color:var(--tx2)}

/* ── Mempedia graph view ── */
.mg-view{display:none;flex-direction:column;flex:1;overflow:hidden;background:var(--bg)}
.mg-view.show{display:flex}

/* Toolbar */
.mg-toolbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--sb);border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap}
.mg-search{flex:1;min-width:140px;max-width:280px;padding:5px 10px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx2);font:inherit;font-size:12.5px;outline:none;transition:border-color .15s}
.mg-search:focus{border-color:var(--acc)}
.mg-search::placeholder{color:var(--dim)}
.mg-stats{font-size:11.5px;color:var(--dim);white-space:nowrap}
.mg-tbtn{padding:5px 12px;border-radius:var(--rs);background:var(--sf2);color:var(--tx);font-size:12px;transition:background .15s}
.mg-tbtn:hover{background:var(--bd)}
.mg-type-legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-left:auto}
.mg-legend-dot{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--dim)}
.mg-legend-color{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* Main area: canvas + detail panel */
.mg-main{display:flex;flex:1;overflow:hidden;position:relative}

/* Canvas wrap */
.mg-canvas-wrap{flex:1;overflow:hidden;position:relative;cursor:grab;user-select:none;background:radial-gradient(ellipse at center,#efe6d6 0%,var(--bg) 100%)}
.mg-canvas-wrap.panning{cursor:grabbing}

/* Transform container (pan/zoom) */
#mg-world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#mg-svg{position:absolute;left:0;top:0;pointer-events:none;overflow:visible}
#mg-nodes-layer{position:absolute;top:0;left:0}

/* Node cards */
.mg-node-card{position:absolute;width:180px;transform:translate(-50%,-50%);background:var(--sf);border:2px solid var(--bd);border-radius:10px;padding:10px 11px 9px;cursor:pointer;transition:box-shadow .18s,background .15s,border-color .18s;font-size:12px}
.mg-node-card:hover{background:var(--sf2);box-shadow:0 4px 18px rgba(74,60,41,.18)}
.mg-node-card.selected{border-color:var(--acc);box-shadow:0 0 0 3px rgba(47,111,143,.18),0 4px 22px rgba(74,60,41,.2)}
.mgn-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.mgn-type{font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:3px;line-height:1.4}
.mgn-imp{font-size:9px;color:var(--acc);letter-spacing:1px;opacity:.7}
.mgn-title{font-size:12.5px;font-weight:600;color:var(--tx2);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word;margin-bottom:4px}
.mgn-preview{font-size:11px;color:var(--dim);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:break-word}

/* Loading overlay */
.mg-loading{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:rgba(247,243,234,.72);z-index:100;pointer-events:none}
.mg-loading-spinner{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.mg-empty-msg{color:var(--dim);font-size:13px;text-align:center;line-height:1.7}

/* Detail panel */
.mg-detail{width:320px;flex-shrink:0;background:var(--sb);border-left:1px solid var(--bd);display:none;flex-direction:column;overflow:hidden}
.mg-detail.show{display:flex}
.mgd-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;gap:8px}
.mgd-hdr-title{font-size:13px;font-weight:600;color:var(--tx2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mgd-close{font-size:16px;color:var(--dim);padding:0 4px;line-height:1;transition:color .15s}
.mgd-close:hover{color:var(--tx2)}
.mgd-body{flex:1;overflow-y:auto;padding:14px}
.mgd-type-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.mgd-imp{font-size:11px;color:var(--dim)}
.mgd-id{font-size:10.5px;font-family:"SFMono-Regular",Consolas,Menlo,monospace;color:var(--dim);margin-bottom:10px;word-break:break-all}
.mgd-summary{font-size:13px;color:var(--tx);line-height:1.65;margin-bottom:12px;border-left:3px solid var(--acc2);padding-left:10px}
.mgd-section-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);margin:10px 0 6px}
.mgd-link-out,.mgd-link-in{font-size:12px;color:var(--tx);padding:3px 0;line-height:1.5}
.mgd-link-out b,.mgd-link-in b{color:var(--acc)}
.mgd-link-label{font-size:10.5px;color:var(--dim);font-style:italic;margin-left:4px}
.mgd-body-text{font-size:12px;color:var(--tx);line-height:1.7;white-space:pre-wrap;word-break:break-word;background:var(--sf);border-radius:var(--rs);padding:10px;margin-top:4px;max-height:320px;overflow-y:auto}
.mgd-body-text code{font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:11px}

/* Empty state */
#mg-empty{display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:14px;pointer-events:none}
#mg-empty.show{display:flex}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="h-logo"><span>🧠</span><span>CodeCLI</span></div>
    <nav class="htabs">
      <button class="htab active" id="tab-chat" onclick="showView('chat')">💬 Chat</button>
      <button class="htab" id="tab-graph" onclick="showView('graph')">🕸 Mempedia</button>
      <button class="htab" id="tab-knowledge" onclick="showView('knowledge')" title="可编辑核心知识库 — 支持 Markdown 编辑、图谱可视化与版本追溯">📚 知识库</button>
    </nav>
    <div class="h-title" id="h-title">Select a conversation</div>
    <div class="h-status"><div class="sdot" id="sdot"></div><span id="stxt">Ready</span></div>
  </header>

  <div class="body" id="view-chat">
    <aside class="sidebar">
      <div class="sb-hd"><span>Conversations</span><button id="btn-new">＋ New</button></div>
      <div id="tlist"></div>

<script>
/* ===================================================================
   Constants
=================================================================== */
const STATUS_COLOR = {
  active:     '#539bf5',
  completed:  '#46954a',
  queued:     '#636e7b',
  finalizing: '#c69026',
  error:      '#e5534b'
};
const STATUS_GLYPH = {active:'◆', completed:'●', queued:'○', finalizing:'◐', error:'✖'};
const TRACE_ICON   = {thought:'🤔', action:'⚡', observation:'👁', error:'❌'};
const PHASE_LABEL  = {
  branching: 'Branching',
  synthesizing: 'Synthesizing',
  rebranching: 'Rebranching',
  complete: 'Complete'
};
const PHASE_COLOR  = {
  branching: '#539bf5',
  synthesizing: '#c69026',
  rebranching: '#9e6dff',
  complete: '#46954a'
};
const BRANCH_CARD_PALETTE = [
  { border: '#539bf5', bg: 'rgba(83,155,245,0.12)', title: '#2f6f8f', phaseBg: 'rgba(83,155,245,0.10)', phaseBorder: 'rgba(83,155,245,0.28)', kindBg: 'rgba(83,155,245,0.07)', kindBorder: 'rgba(83,155,245,0.20)' },
  { border: '#c69026', bg: 'rgba(198,144,38,0.12)', title: '#875d24', phaseBg: 'rgba(198,144,38,0.10)', phaseBorder: 'rgba(198,144,38,0.24)', kindBg: 'rgba(198,144,38,0.07)', kindBorder: 'rgba(198,144,38,0.18)' },
  { border: '#57ab5a', bg: 'rgba(87,171,90,0.12)', title: '#35683a', phaseBg: 'rgba(87,171,90,0.10)', phaseBorder: 'rgba(87,171,90,0.24)', kindBg: 'rgba(87,171,90,0.07)', kindBorder: 'rgba(87,171,90,0.18)' },
  { border: '#9e6dff', bg: 'rgba(158,109,255,0.12)', title: '#6d43bf', phaseBg: 'rgba(158,109,255,0.10)', phaseBorder: 'rgba(158,109,255,0.24)', kindBg: 'rgba(158,109,255,0.07)', kindBorder: 'rgba(158,109,255,0.18)' }
];

/* ===================================================================
   State
=================================================================== */
let currentTid = null;
let busy = false;
let activeCtrl = null;  // AbortController for ongoing stream

/* ===================================================================
   Helpers
=================================================================== */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function reltime(ts) {
  const d = Date.now() - ts, s = Math.floor(d / 1e3), m = Math.floor(s / 60), h = Math.floor(m / 60);
  return s < 60 ? 'just now' : m < 60 ? `${m}m ago` : h < 24 ? `${h}h ago` : new Date(ts).toLocaleDateString();
}
function dateGroup(ts) {
  const td = new Date(); td.setHours(0,0,0,0);
  const dd = new Date(ts); dd.setHours(0,0,0,0);
  const diff = td - dd;
  return diff < 864e5 ? 'Today' : diff < 1728e5 ? 'Yesterday' : diff < 6048e5 ? 'This week' : 'Older';
}

function detectBranchKind(node, id) {
  if (!node) return 'branch';
  if (node.kind) return node.kind;
  if (id === 'B0' && Number(node.depth || 0) === 0) return 'root';
  if (/^R\d+(?:\.|$)/i.test(id) || /^fix:/i.test(String(node.label || '')) || /^R\d+(?:\.|$)/i.test(String(node.parentId || ''))) {
    return 'rebranch';
  }
  return 'branch';
}

function detectRetry(node, id) {
  if (node && Number.isFinite(node.retry)) return Number(node.retry);
  const match = String(id || '').match(/^R(\d+)(?:\.|$)/i) || String(node?.parentId || '').match(/^R(\d+)(?:\.|$)/i);
  return match ? Number(match[1]) : null;
}

function getActiveBranchIds(snap) {
  if (Array.isArray(snap?.activeBranchIds) && snap.activeBranchIds.length) {
    return snap.activeBranchIds.slice();
  }
  return snap?.activeBranchId ? [snap.activeBranchId] : [];
}

function summarizeBranchSnap(snap) {
  const nodes = Object.values(snap?.nodes || {});
  const activeIds = getActiveBranchIds(snap);
  const queued = Number.isFinite(snap?.queueCount) ? snap.queueCount : nodes.filter(node => node.status === 'queued').length;
  const completed = Number.isFinite(snap?.completed) ? snap.completed : nodes.filter(node => node.status === 'completed').length;
  const errors = Number.isFinite(snap?.errors) ? snap.errors : nodes.filter(node => node.status === 'error').length;
  const rebranchCount = Number.isFinite(snap?.rebranchCount)
    ? snap.rebranchCount
    : nodes.reduce((max, node) => Math.max(max, detectRetry(node, node.id) || 0), 0);
  const phase = snap?.phase || (rebranchCount > 0 && activeIds.length ? 'rebranching' : activeIds.length ? 'branching' : 'complete');
  return {
    nodeCount: nodes.length,
    activeIds,
    queued,
    completed,
    errors,
    rebranchCount,
    phase,
    phaseLabel: PHASE_LABEL[phase] || PHASE_LABEL.branching,
    phaseColor: PHASE_COLOR[phase] || PHASE_COLOR.branching,
    activeLabel: activeIds[0] || (phase === 'synthesizing' ? 'synthesizing' : 'none'),
    statusMessage: String(snap?.statusMessage || '').trim()
  };
}

function branchMetaText(snap) {
  const summary = summarizeBranchSnap(snap);
  const retrySuffix = summary.rebranchCount > 0 ? ` · retry ${summary.rebranchCount}` : '';
  return `R${snap?.round || 1} · ${summary.phaseLabel}${retrySuffix} · ${summary.nodeCount} nodes · active: ${summary.activeLabel}`;
}

function branchSummaryHtml(snap) {
  const summary = summarizeBranchSnap(snap);
  const chips = [
    `<span class="bp-chip phase" style="color:${summary.phaseColor};border-color:${summary.phaseColor}33;background:${summary.phaseColor}12">${esc(summary.phaseLabel)}</span>`,
    `<span class="bp-chip">Active ${summary.activeIds.length}</span>`,
    `<span class="bp-chip">Queued ${summary.queued}</span>`,
    `<span class="bp-chip">Completed ${summary.completed}</span>`,
  ];
  if (summary.errors > 0) chips.push(`<span class="bp-chip">Errors ${summary.errors}</span>`);
  if (summary.rebranchCount > 0) chips.push(`<span class="bp-chip">Retry ${summary.rebranchCount}</span>`);
  return chips.join('');
}

function branchIdHash(id) {
  return String(id || '').split('').reduce((sum, ch) => sum + ch.charCodeAt(0), 0);
}

function strengthenAlpha(color, stronger) {
  return stronger ? color.replace('0.12)', '0.18)').replace('0.10)', '0.16)').replace('0.07)', '0.10)') : color;
}

function getBranchCardTheme(node, id, isActive) {
  const kind = detectBranchKind(node, id);
  const status = String(node?.status || 'queued');

  if (status === 'error') {
    return {
      card: `border-color:rgba(229,83,75,.55);background:${isActive ? 'rgba(229,83,75,0.16)' : 'rgba(229,83,75,0.10)'};`,
      title: 'color:#ad2e2a;',
      phaseTag: 'border-color:rgba(229,83,75,.34);background:rgba(229,83,75,.12);color:#ad2e2a;',
      kindTag: 'border-color:rgba(229,83,75,.24);background:rgba(229,83,75,.08);color:#ad2e2a;'
    };
  }

  if (status === 'completed') {
    return {
      card: `border-color:rgba(87,171,90,.42);background:${isActive ? 'rgba(87,171,90,0.16)' : 'rgba(87,171,90,0.10)'};`,
      title: 'color:#35683a;',
      phaseTag: 'border-color:rgba(87,171,90,.30);background:rgba(87,171,90,.10);color:#35683a;',
      kindTag: 'border-color:rgba(87,171,90,.20);background:rgba(87,171,90,.07);color:#35683a;'
    };
  }

  if (kind === 'root') {
    return {
      card: `border-color:rgba(83,155,245,.48);background:${isActive ? 'rgba(83,155,245,0.18)' : 'rgba(83,155,245,0.10)'};`,
      title: 'color:#2f6f8f;',
      phaseTag: 'border-color:rgba(83,155,245,.30);background:rgba(83,155,245,.10);color:#2f6f8f;',
      kindTag: 'border-color:rgba(83,155,245,.22);background:rgba(83,155,245,.07);color:#2f6f8f;'
    };
  }

  if (kind === 'rebranch') {
    return {
      card: `border-color:rgba(158,109,255,.45);background:${isActive ? 'rgba(158,109,255,0.18)' : 'rgba(158,109,255,0.10)'};`,
      title: 'color:#6d43bf;',
      phaseTag: 'border-color:rgba(158,109,255,.30);background:rgba(158,109,255,.10);color:#6d43bf;',
      kindTag: 'border-color:rgba(158,109,255,.22);background:rgba(158,109,255,.07);color:#6d43bf;'
    };
  }

  const palette = BRANCH_CARD_PALETTE[branchIdHash(id) % BRANCH_CARD_PALETTE.length];
  return {
    card: `border-color:${palette.phaseBorder};background:${strengthenAlpha(palette.bg, isActive)};`,
    title: `color:${palette.title};`,
    phaseTag: `border-color:${palette.phaseBorder};background:${strengthenAlpha(palette.phaseBg, isActive)};color:${palette.title};`,
    kindTag: `border-color:${palette.kindBorder};background:${strengthenAlpha(palette.kindBg, isActive)};color:${palette.title};`
  };
}

function buildLastTraces(traces) {
  const last = {};
  (traces || []).forEach(trace => {
    const branchId = trace?.metadata?.branchId;
    if (!branchId) return;
    if (trace.type === 'thought' || trace.type === 'action' || trace.type === 'observation') {
      last[branchId] = String(trace.content || '').slice(0, 80);
    }
  });
  return last;
}
async function api(method, url, body) {
  const r = await fetch(url, {
    method,
    headers: {'Content-Type': 'application/json'},
    body: body ? JSON.stringify(body) : undefined
  });
  return r.json();
}

/* ===================================================================
   Thread list
=================================================================== */
async function loadList() {
  const d = await api('GET', '/api/threads');
  if (!d.ok) return;
  const el = document.getElementById('tlist');
  const ts = (d.threads || []).slice().sort((a, b) => (b.last_updated || b.created_at) - (a.last_updated || a.created_at));
  if (!ts.length) {
    el.innerHTML = '<div style="padding:20px 12px;color:var(--dim);font-size:12px;text-align:center">No conversations yet.</div>';
    return;
  }
  const groups = {};
  ts.forEach(t => { const g = dateGroup(t.last_updated || t.created_at); (groups[g] = groups[g] || []).push(t); });
  let html = '';
  ['Today','Yesterday','This week','Older'].forEach(g => {
    if (!groups[g]) return;
    html += `<div class="tg-lbl">${g}</div>`;
    groups[g].forEach(t => {
      const act = t.id === currentTid ? ' act' : '';
      html += `<div class="ti${act}" onclick="selectThread('${esc(t.id)}')">
        <div class="ti-dot"></div>
        <div class="ti-body">
          <div class="ti-title">${esc(t.title)}</div>
          <div class="ti-time">${reltime(t.last_updated || t.created_at)}</div>
        </div>
        <button class="ti-del" onclick="delThread(event,'${esc(t.id)}')">×</button>
      </div>`;
    });
  });
  el.innerHTML = html;
}

async function createNewThread() {
  const d = await api('POST', '/api/threads', {title: 'New Conversation'});
  if (!d.ok) return;
  await loadList();
  selectThread(d.thread.id);
}

async function delThread(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this conversation?')) return;
  await api('DELETE', `/api/threads/${id}`);
  if (currentTid === id) { currentTid = null; showEmpty(); }
  await loadList();
}

async function selectThread(id) {
  currentTid = id;
  const d = await api('GET', `/api/threads/${id}`);
  if (!d.ok) { alert('Thread not found'); return; }
  await loadList();
  renderThread(d.thread);
}

function showEmpty() {
  document.getElementById('empty').style.display = '';
  document.getElementById('convo').style.display = 'none';
  document.getElementById('ibar').style.display = 'none';
  const ht = document.getElementById('h-title');
  ht.textContent = 'Select a conversation';
  ht.classList.remove('on');
  ht.onclick = null;
}

function renderThread(thread) {
  document.getElementById('empty').style.display = 'none';
  document.getElementById('convo').style.display = '';
  document.getElementById('ibar').style.display = '';
  const ht = document.getElementById('h-title');
  ht.textContent = thread.title;
  ht.classList.add('on');
  ht.title = 'Click to rename';
  ht.onclick = () => renameThread(thread.id, thread.title);
  const c = document.getElementById('convo');
  c.innerHTML = thread.rounds.map(r => roundHtml(r)).join('');
  c.scrollTop = c.scrollHeight;
}

/* ===================================================================
   SVG Branch Tree Layout

   Branch IDs follow dot-notation: B0 (root), B0.1, B0.2, B0.1.1, …
   We lay the tree out left-to-right (depth = X, sibling order = Y).
   Each leaf gets 1 slot; internal nodes span their children.
=================================================================== */
const SVG_DX = 96;   // horizontal gap (depth axis)
const SVG_DY = 58;   // vertical gap (sibling axis)
const SVG_PAD = 24;
const SVG_NR = 13;   // node circle radius

function sortBranchIds(ids) {
  return ids.slice().sort((a, b) => {
    const la = a.replace(/^[A-Z]+/i, '').split('.').map(Number);
    const lb = b.replace(/^[A-Z]+/i, '').split('.').map(Number);
    for (let i = 0; i < Math.max(la.length, lb.length); i++) {
      const av = la[i] ?? -1, bv = lb[i] ?? -1;
      if (av !== bv) return av - bv;
    }
    return a.localeCompare(b);
  });
}

function buildLayout(snap) {
  const nodeMap = snap.nodes || {};
  const ids = sortBranchIds(Object.keys(nodeMap));
  if (!ids.length) return null;

  /* build children lists */
  const children = {};   // id -> [childId, ...]
  ids.forEach(id => {
    const n = nodeMap[id];
    const p = n.parentId || '__root__';
    (children[p] = children[p] || []).push(id);
  });

  /* assign slot (y) position via post-order DFS */
  const slot = {};
  let nextSlot = 0;
  function assignSlots(id) {
    const kids = children[id] || [];
    if (!kids.length) {
      slot[id] = nextSlot++;
    } else {
      kids.forEach(k => assignSlots(k));
      const min = Math.min(...kids.map(k => slot[k]));
      const max = Math.max(...kids.map(k => slot[k]));
      slot[id] = (min + max) / 2;
    }
  }
  const roots = children['__root__'] || [];
  roots.forEach(r => assignSlots(r));

  /* convert to pixel coords */
  const pos = {};
  ids.forEach(id => {
    const depth = nodeMap[id].depth || 0;
    pos[id] = {
      x: SVG_PAD + depth * SVG_DX,
      y: SVG_PAD + slot[id] * SVG_DY
    };
  });

  const maxX = Math.max(...ids.map(id => pos[id].x)) + SVG_PAD + SVG_NR + 48;
  const maxY = Math.max(...ids.map(id => pos[id].y)) + SVG_PAD + SVG_NR + 28;

  return {pos, nodeMap, ids, children, maxX, maxY};
}

function renderSvgTree(snap) {
  if (!snap || !snap.nodes || !Object.keys(snap.nodes).length) {
    return '<div style="padding:14px 12px;color:var(--dim);font-size:12px">No branches yet…</div>';
  }
  const tree = buildLayout(snap);
  if (!tree) return '';
  const {pos, nodeMap, ids, maxX, maxY} = tree;
  const activeIds = new Set(getActiveBranchIds(snap));

  let edgesSvg = '', nodesSvg = '';

  /* edges first (drawn under nodes) */
  ids.forEach(id => {
    const n = nodeMap[id];
    if (!n.parentId || !pos[n.parentId]) return;
    const {x: px, y: py} = pos[n.parentId];
    const {x: cx, y: cy} = pos[id];
    const mx = (px + cx) / 2;
    const parentColor = STATUS_COLOR[nodeMap[n.parentId]?.status] || '#2d333b';
    edgesSvg += `<path d="M${px},${py} C${mx},${py} ${mx},${cy} ${cx},${cy}"
      fill="none" stroke="${parentColor}55" stroke-width="1.8" class="edge-line"/>`;
  });

  /* nodes */
  ids.forEach(id => {
    const n = nodeMap[id];
    const {x, y} = pos[id];
    const color = STATUS_COLOR[n.status] || '#adbac7';
    const glyph = STATUS_GLYPH[n.status] || '·';
    const isActive = activeIds.has(id);
    const kind = detectBranchKind(n, id);
    const truncLabel = n.label && n.label !== id
      ? (n.label.length > 12 ? n.label.slice(0, 11) + '…' : n.label)
      : '';

    /* pulse ring for active */
    if (isActive) {
      nodesSvg += `<circle cx="${x}" cy="${y}" r="${SVG_NR + 5}" fill="none"
        stroke="${color}" stroke-width="1.5" opacity="0.35">
        <animate attributeName="opacity" values="0.35;0.1;0.35" dur="1.4s" repeatCount="indefinite"/>
      </circle>`;
    }
    /* filled circle */
    nodesSvg += `<circle cx="${x}" cy="${y}" r="${SVG_NR}"
      fill="${color}22" stroke="${color}" stroke-width="${isActive ? 2.5 : 1.8}"${kind === 'rebranch' ? ' stroke-dasharray="3 3"' : ''}/>`;
    /* status glyph inside */
    nodesSvg += `<text x="${x}" y="${y + 4}" text-anchor="middle"
      font-size="11" fill="${color}"
      font-family="-apple-system,BlinkMacSystemFont,sans-serif">${glyph}</text>`;
    if (kind === 'rebranch') {
      nodesSvg += `<text x="${x + SVG_NR + 6}" y="${y - 6}" text-anchor="middle"
        font-size="8.5" fill="#9e6dff"
        font-family="-apple-system,BlinkMacSystemFont,sans-serif">re</text>`;
    }
    /* branch id below circle */
    nodesSvg += `<text x="${x}" y="${y + SVG_NR + 12}" text-anchor="middle"
      font-size="9.5" fill="#636e7b"
      font-family="SFMono-Regular,Consolas,Menlo,monospace">${esc(id)}</text>`;
    /* label below id */
    if (truncLabel) {
      nodesSvg += `<text x="${x}" y="${y + SVG_NR + 23}" text-anchor="middle"
        font-size="9" fill="#8b949e"
        font-family="-apple-system,BlinkMacSystemFont,sans-serif">${esc(truncLabel)}</text>`;
    }
  });

  return `<svg width="${maxX}" height="${maxY}" viewBox="0 0 ${maxX} ${maxY}"
    xmlns="http://www.w3.org/2000/svg">
    <g>${edgesSvg}</g>
    <g>${nodesSvg}</g>
  </svg>`;
}

function renderNodeSidebar(snap, lastTraces) {
  if (!snap || !snap.nodes) return '';
  const ids = sortBranchIds(Object.keys(snap.nodes));
  const activeIds = new Set(getActiveBranchIds(snap));
  return ids.map(id => {
    const n = snap.nodes[id];
    const color = STATUS_COLOR[n.status] || '#adbac7';
    const isActive = activeIds.has(id);
    const trace = lastTraces && lastTraces[id] ? lastTraces[id] : '';
    const kind = detectBranchKind(n, id);
    const retry = detectRetry(n, id);
    const kindLabel = kind === 'rebranch' ? `rebranch${retry ? ` r${retry}` : ''}` : kind;
    const theme = getBranchCardTheme(n, id, isActive);
    return `<div class="bv-node-card${isActive ? ' is-active' : ''}" style="${theme.card}">
      <div class="bv-nc-id" style="${theme.title}">${STATUS_GLYPH[n.status] || '·'} ${esc(id)}</div>
      <div class="bv-nc-lbl" style="${theme.title}">${esc(n.label && n.label !== id ? n.label : '—')}</div>
      <div class="bv-nc-tags">
        <span class="bv-tag phase" style="${theme.phaseTag}">${esc(n.status || 'queued')}</span>
        <span class="bv-tag kind" style="${theme.kindTag}">${esc(kindLabel)}</span>
      </div>
      ${trace ? `<div class="bv-nc-trace">${esc(trace)}</div>` : ''}
    </div>`;
  }).join('');
}

/* ── Build full panel HTML (used for saved rounds) ── */
function branchPanelHtml(snap, panelId, lastTraces) {
  if (!snap) return '';
  return `<div class="bp" id="${panelId}">
    <div class="bp-hdr" onclick="toggleBp('${panelId}')">
      <span class="bp-chevron">▶</span>
      <span class="bp-title">Branch Tree</span>
      <span class="bp-meta" id="${panelId}-meta">${esc(branchMetaText(snap))}</span>
    </div>
    <div class="bp-summary" id="${panelId}-summary">${branchSummaryHtml(snap)}</div>
    <div class="bp-note" id="${panelId}-note">${esc(snap.statusMessage || '')}</div>
    <div class="bp-body">
      <div class="bv-svg-wrap" id="${panelId}-svg">${renderSvgTree(snap)}</div>
      <div class="bv-sidebar" id="${panelId}-sb">${renderNodeSidebar(snap, lastTraces)}</div>
    </div>
  </div>`;
}

/* ── Incrementally update an existing panel in-place ── */
function updateBranchPanel(panelId, snap, lastTraces) {
  if (!snap) return;
  const svgEl  = document.getElementById(panelId + '-svg');
  const sbEl   = document.getElementById(panelId + '-sb');
  const metaEl = document.getElementById(panelId + '-meta');
  const summaryEl = document.getElementById(panelId + '-summary');
  const noteEl = document.getElementById(panelId + '-note');
  if (!svgEl) return;

  svgEl.innerHTML = renderSvgTree(snap);
  if (sbEl) sbEl.innerHTML = renderNodeSidebar(snap, lastTraces);
  if (summaryEl) summaryEl.innerHTML = branchSummaryHtml(snap);
  if (noteEl) noteEl.textContent = snap.statusMessage || '';
  if (metaEl) metaEl.textContent = branchMetaText(snap);
}

function traceEntryHtml(t) {

  const branchTag = t.metadata?.branchId ? `[${t.metadata.branchId}] ` : '';

/* ===================================================================
   Round HTML (for previously saved rounds)
=================================================================== */
function roundHtml(round) {
  const panelId  = 'bp-' + round.id;
  const bpHtml   = branchPanelHtml(round.branch_snapshot, panelId, buildLastTraces(round.traces));
  const traces   = round.traces || [];
  const trHtml   = traces.length ? `
    <div class="tr-toggle" id="trh-${round.id}" onclick="toggleTr('${round.id}')">
      <span class="tr-chevron">▶</span>
      <span>${traces.length} trace events</span>
    </div>
    <div class="tr-list" id="trl-${round.id}">${traces.map(t => traceEntryHtml(t)).join('')}</div>` : '';

  return `<div class="round" id="rnd-${round.id}">
    <div class="msg-u">
      <div class="bubble-u">${esc(round.user_input)}</div>
      <div class="av av-u">U</div>
    </div>
    ${bpHtml}
    ${trHtml}
    <div class="msg-a">
      <div class="av av-a">🤖</div>
      <div class="bubble-a">
        <div class="a-name">CodeCLI Agent</div>
        <div class="a-body">${fmtBody(round.agent_response)}</div>
      </div>
    </div>
  </div>`;
}

function fmtBody(text) {
  if (!text) return '';
  try {
    if (typeof marked !== 'undefined' && marked.parse) {
      return marked.parse(String(text), { breaks: true });
    }
  } catch (_) {}
  /* fallback: escaped + inline code */
  let s = esc(text);
  s = s.replace(/`([^`\n]{1,200})`/g, '<code>$1</code>');
  return s;
}

/* ===================================================================
   Streaming send
=================================================================== */
async function send() {
  if (!currentTid) { await createNewThread(); if (!currentTid) return; }
  const inp   = document.getElementById('inp');
  const query = inp.value.trim();
  if (!query || busy) return;

  inp.value = '';
  autoResize();
  setBusy(true);

  /* ensure chat is visible */
  const convo = document.getElementById('convo');
  convo.style.display = '';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('ibar').style.display = '';

  /* unique IDs for this live round */
  const liveKey  = Date.now().toString(36);
  const panelId  = 'bp-live-' + liveKey;
  const traceId  = 'trl-live-' + liveKey;
  const trHdrId  = 'trh-live-' + liveKey;
  const typingId = 'typing-live-' + liveKey;

  /* skeleton branch state (B0 active) */
  const initSnap = {
    round: 1,
    phase: 'branching',
    rebranchCount: 0,
    statusMessage: 'Root branch active.',
    completed: 0,
    errors: 0,
    activeBranchId: 'B0',
    activeBranchIds: ['B0'],
    queueCount: 0,
    nodes: { B0: {id:'B0', parentId:null, label:'root', depth:0, step:0, status:'active', kind:'root', retry:null} }
  };

  /* Build the live round DOM element */
  const tempDiv = document.createElement('div');
  tempDiv.className = 'round';
  tempDiv.innerHTML = `
    <div class="msg-u">
      <div class="bubble-u">${esc(query)}</div>
      <div class="av av-u">U</div>
    </div>
    ${branchPanelHtml(initSnap, panelId, {})}
    <div class="tr-toggle" id="${trHdrId}" onclick="this.classList.toggle('open');document.getElementById('${traceId}').classList.toggle('open')">
      <span class="tr-chevron">▶</span>
      <span id="${trHdrId}-cnt">0 trace events</span>
    </div>
    <div class="tr-list" id="${traceId}" style="display:none"></div>
    <div class="typing" id="${typingId}">
      <div class="typing-av">🤖</div>
      <div class="tdots"><span></span><span></span><span></span></div>
    </div>`;
  convo.appendChild(tempDiv);

  /* auto-open the branch panel during live run */
  document.getElementById(panelId)?.classList.add('open');
  convo.scrollTop = convo.scrollHeight;

  /* streaming state */
  let snap = initSnap;
  const lastTraces = {};
  let traceCnt = 0;
  const traceListEl = document.getElementById(traceId);
  const trHdrCntEl  = document.getElementById(trHdrId + '-cnt');

  /* abort any previous stream */
  if (activeCtrl) { activeCtrl.abort(); activeCtrl = null; }
  const ctrl = new AbortController();
  activeCtrl = ctrl;

  try {
    const selectedMode = document.getElementById('mode-select')?.value || 'branching';
    const resp = await fetch(`/api/threads/${currentTid}/stream`, {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({query, agentMode: selectedMode}),
      signal:  ctrl.signal
    });

    if (!resp.ok) {
      const j = await resp.json().catch(() => ({error: 'Stream request failed'}));
      showErr(j.error || 'Stream failed');
      tempDiv.remove();
      setBusy(false);
      return;
    }

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});

      /* parse SSE frames (data: {...}\n\n) */
      let nl;
      while ((nl = buf.indexOf('\n\n')) >= 0) {
        const chunk = buf.slice(0, nl);
        buf = buf.slice(nl + 2);
        const line = chunk.startsWith('data:') ? chunk.slice(5).trim() : chunk.trim();
        if (!line) continue;
        let msg;
        try { msg = JSON.parse(line); } catch { continue; }

        if (msg.kind === 'init') {
          snap = msg.branchState || snap;
          updateBranchPanel(panelId, snap, lastTraces);

        } else if (msg.kind === 'trace') {
          const ev = msg.event;
          snap = msg.branchState || snap;

          /* update per-branch last-trace text */
          if (ev?.metadata?.branchId) {
            const bid = ev.metadata.branchId;
            if (ev.type === 'thought' || ev.type === 'action') {
              lastTraces[bid] = String(ev.content || '').slice(0, 80);
            }
          }
          updateBranchPanel(panelId, snap, lastTraces);

          /* append trace entry */
          if (traceListEl && ev) {
            const row = document.createElement('div');
            row.innerHTML = traceEntryHtml(ev);
            traceListEl.appendChild(row.firstElementChild);
            traceListEl.scrollTop = traceListEl.scrollHeight;
          }
          traceCnt++;
          if (trHdrCntEl) trHdrCntEl.textContent = `${traceCnt} trace events`;
          convo.scrollTop = convo.scrollHeight;

        } else if (msg.kind === 'approval_request') {
          /* governance approval prompt */
          const approvalId = msg.approvalId;
          const p = msg.prompt || {};
          const approvalEl = document.createElement('div');
          approvalEl.classList.add('approval-prompt');
          approvalEl.id = 'approval-' + approvalId;
          approvalEl.innerHTML = `
            <div class="approval-icon">⚠️</div>
            <div class="approval-body">
              <div class="approval-title">Governance Approval Required</div>
              <div class="approval-detail"><strong>Tool:</strong> ${esc(p.toolName || '')}</div>
              <div class="approval-detail"><strong>Reason:</strong> ${esc(p.reason || '')}</div>
              ${p.args?.path ? `<div class="approval-detail"><strong>Path:</strong> <code>${esc(String(p.args.path))}</code></div>` : ''}
              ${p.args?.command ? `<div class="approval-detail"><strong>Command:</strong> <code>${esc(String(p.args.command).slice(0, 200))}</code></div>` : ''}
              <div class="approval-actions">
                <button class="approval-btn approval-allow" onclick="resolveApproval('${esc(approvalId)}', 'allow', this)">✅ Allow</button>
                <button class="approval-btn approval-deny" onclick="resolveApproval('${esc(approvalId)}', 'deny', this)">❌ Deny</button>
              </div>
            </div>`;
          const convoEl = document.getElementById('convo');
          convoEl.appendChild(approvalEl);
          convoEl.scrollTop = convoEl.scrollHeight;

        } else if (msg.kind === 'done') {
          /* remove typing indicator */
          document.getElementById(typingId)?.remove();

          /* final branch state */
          if (msg.round?.branch_snapshot) {
            snap = msg.round.branch_snapshot;
            updateBranchPanel(panelId, snap, lastTraces);
          }

          /* agent response bubble */
          const ansDiv = document.createElement('div');
          ansDiv.classList.add('msg-a');
          ansDiv.innerHTML = `
            <div class="av av-a">🤖</div>
            <div class="bubble-a">
              <div class="a-name">CodeCLI Agent</div>
              <div class="a-body">${fmtBody(msg.round?.agent_response || '')}</div>
            </div>`;
          tempDiv.appendChild(ansDiv);
          convo.scrollTop = convo.scrollHeight;

          if (msg.thread) {
            document.getElementById('h-title').textContent = msg.thread.title;
            currentTid = msg.thread.id;
          }
          await loadList();
          setBusy(false);

        } else if (msg.kind === 'error') {
          document.getElementById(typingId)?.remove();
          showErr(msg.error || 'Unknown error');
          setBusy(false);
        }
      }
    }
  } catch (err) {
    if (err.name === 'AbortError') return;
    console.error('Stream error:', err);
    document.getElementById(typingId)?.remove();
    showErr(String(err));
    setBusy(false);
  }
}

function showErr(msg) {
  const el = document.createElement('div');
  el.style.cssText = 'padding:6px 0;color:var(--red);font-size:12px;';
  el.textContent = '⚠ ' + msg;
  document.getElementById('convo').appendChild(el);
  setTimeout(() => el.remove(), 8000);
}

async function resolveApproval(approvalId, answer, btnEl) {
  /* disable both buttons immediately */
  const parent = btnEl.closest('.approval-prompt');
  if (parent) {
    parent.querySelectorAll('.approval-btn').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
  }
  try {
    await api('POST', `/api/threads/${currentTid}/approve`, { approvalId, answer });
    if (parent) {
      const label = answer === 'allow' ? '✅ Allowed' : '❌ Denied';
      parent.querySelector('.approval-actions').innerHTML = `<span class="approval-resolved">${label}</span>`;
    }
  } catch (err) {
    console.error('Approval resolve error:', err);
    if (parent) parent.querySelectorAll('.approval-btn').forEach(b => { b.disabled = false; b.style.opacity = '1'; });
  }
}

  const d = await api('POST', `/api/threads/${id}/title`, {title: t});

/* ===================================================================
   Mempedia Knowledge Graph
=================================================================== */
const TYPE_COLORS = {
  concept:   '#539bf5', process:   '#46954a', reference: '#c69026',
  decision:  '#e5534b', index:     '#9e6dff', glossary:  '#57ab5a',
  skill:     '#f8a965', memory:    '#63b3ed',
};
function typeColor(t) { return TYPE_COLORS[String(t || '')] || '#636e7b'; }

let graphData   = { nodes: [], edges: [] };
let simNodes    = [];  // {id, x, y, vx, vy, pinned, card}
let simEdges    = [];  // {si, ti, label, weight}
let selectedIdx = -1;
let graphLoaded = false;

// Pan / zoom
let gTx = 0, gTy = 0, gScale = 1;
let isPanning   = false, panSX = 0, panSY = 0, panTX0 = 0, panTY0 = 0;
let dragNodeIdx = -1, dnOX = 0, dnOY = 0;

// Simulation constants
const F_REPEL   = 20000;
const F_LEN     = 230;
const F_SPRING  = 0.022;
const F_FRIC    = 0.87;
const F_GRAV    = 0.005;
const WORLD_CX  = 2000, WORLD_CY = 2000;
let simRaf = null, simTicks = 0;

// ── View switching ──────────────────────────────────────────────────
let currentView = 'chat';
function showView(v) {

// ── Build type-color legend ─────────────────────────────────────────
function buildLegend() {
  const types = [...new Set(graphData.nodes.map(n => n.node_type || 'concept'))];
  const el = document.getElementById('mg-legend');

    </div>`

}

// ── Initialise force simulation ──────────────────────────────────────
function initSim() {
  const nodes = graphData.nodes;
  const edges = graphData.edges;
  const nodeIdx = new Map(nodes.map((n, i) => [n.id, i]));

  // Circular initial layout
  const R = Math.min(WORLD_CX, WORLD_CY) * 0.32;
  simNodes = nodes.map((n, i) => {
    const a = (2 * Math.PI * i) / Math.max(1, nodes.length);
    return {
      id: n.id,
      x: WORLD_CX + R * Math.cos(a) + (Math.random() - 0.5) * 60,
      y: WORLD_CY + R * Math.sin(a) + (Math.random() - 0.5) * 60,
      vx: 0, vy: 0, pinned: false, card: null,
    };
  });

  simEdges = edges.map(e => ({
    si: nodeIdx.get(e.source) ?? -1,
    ti: nodeIdx.get(e.target) ?? -1,
    label: e.label || '',
    weight: e.weight || 1.0,
  })).filter(e => e.si >= 0 && e.ti >= 0);

  // Pre-settle layout before showing
  for (let i = 0; i < 180; i++) tickSim();

  buildNodeCards();
  positionCards();
  renderEdges();
  updateStats();

  if (!nodes.length) {
    document.getElementById('mg-empty').classList.add('show');
    return;
  }

  // Continue settling with animation
  simTicks = 0;
  if (simRaf) cancelAnimationFrame(simRaf);
  function loop() {
    if (simTicks < 400) {
      tickSim(); simTicks++;
      positionCards();
      // Re-render edges less frequently (every 3 frames) for performance
      if (simTicks % 3 === 0) renderEdges();
    }
    simRaf = requestAnimationFrame(loop);
  }
  simRaf = requestAnimationFrame(loop);

  centerView();
}

// ── Physics tick ────────────────────────────────────────────────────
function tickSim() {
  const n = simNodes.length;
  if (!n) return;

  // Repulsion (O n²; acceptable for typical < 500 nodes)
  for (let i = 0; i < n; i++) {
    const ni = simNodes[i];
    for (let j = i + 1; j < n; j++) {
      const nj = simNodes[j];
      const dx = nj.x - ni.x, dy = nj.y - ni.y;
      const d2 = dx * dx + dy * dy + 100;
      const d  = Math.sqrt(d2);
      const f  = F_REPEL / d2;
      const fx = f * dx / d, fy = f * dy / d;
      ni.vx -= fx; ni.vy -= fy;
      nj.vx += fx; nj.vy += fy;
    }
  }

  // Spring (edges)
  for (const e of simEdges) {
    const s = simNodes[e.si], t = simNodes[e.ti];
    const dx = t.x - s.x, dy = t.y - s.y;
    const d  = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
    const stretch = d - F_LEN;
    const f  = F_SPRING * stretch;
    const nx = dx / d, ny = dy / d;
    if (!s.pinned) { s.vx += f * nx; s.vy += f * ny; }
    if (!t.pinned) { t.vx -= f * nx; t.vy -= f * ny; }
  }

  // Gravity + integrate
  const maxW = WORLD_CX * 2, maxH = WORLD_CY * 2;
  for (const ni of simNodes) {
    if (ni.pinned) { ni.vx = 0; ni.vy = 0; continue; }
    ni.vx += (WORLD_CX - ni.x) * F_GRAV;
    ni.vy += (WORLD_CY - ni.y) * F_GRAV;
    ni.vx *= F_FRIC;  ni.vy *= F_FRIC;
    ni.x = Math.max(80, Math.min(maxW - 80, ni.x + ni.vx));
    ni.y = Math.max(80, Math.min(maxH - 80, ni.y + ni.vy));
  }
}

// ── Build HTML node cards ────────────────────────────────────────────
function buildNodeCards() {
  const layer = document.getElementById('mg-nodes-layer');
  layer.innerHTML = '';
  simNodes.forEach((sn, i) => {
    const n   = graphData.nodes[i];
    const col = typeColor(n.node_type);
    const imp = Math.min(5, Math.round((n.importance || 0) * 5));
    const impStr = '●'.repeat(imp) + '◦'.repeat(5 - imp);
    const preview = (n.body_preview || n.summary || '')
      .replace(/\n+/g, ' ').trim().slice(0, 150);

    const card = document.createElement('div');
    card.className = 'mg-node-card';
    card.id = 'mgn-' + i;
    card.style.borderColor = col;
    card.innerHTML =
      `<div class="mgn-header">` +
        `<span class="mgn-type" style="background:${col}22;color:${col}">${esc(n.node_type || 'node')}</span>` +
        `<span class="mgn-imp" style="color:${col}">${impStr}</span>` +
      `</div>` +
      `<div class="mgn-title">${esc(n.title || n.id)}</div>` +
      (preview ? `<div class="mgn-preview">${esc(preview)}</div>` : '');

    card.addEventListener('mousedown', e => { e.stopPropagation(); startNodeDrag(e, i); });
    card.addEventListener('click',     e => { e.stopPropagation(); selectNode(i); });

    sn.card = card;
    layer.appendChild(card);
  });
}

function positionCards() {
  for (const sn of simNodes) {
    if (!sn.card) continue;
    sn.card.style.left = sn.x + 'px';
    sn.card.style.top  = sn.y + 'px';
  }
}

// ── Render SVG edges ─────────────────────────────────────────────────
function renderEdges() {
  const svgG = document.getElementById('mg-edges');
  if (!svgG) return;
  const selId = selectedIdx >= 0 ? (simNodes[selectedIdx]?.id || null) : null;

  let html = '';
  for (const e of simEdges) {
    const s = simNodes[e.si], t = simNodes[e.ti];
    if (!s || !t) continue;

    // Offset target point towards edge tip (so arrowhead doesn't overlap the card's center)
    const dx = t.x - s.x, dy = t.y - s.y;
    const d  = Math.sqrt(dx * dx + dy * dy) || 1;
    const ex = t.x - dx / d * 92;   // pull back 92px from center (≈ card half-width)
    const ey = t.y - dy / d * 50;   // pull back 50px from center (≈ card half-height)
    const mx = (s.x + ex) / 2, my = (s.y + ey) / 2;
    const bx = mx - dy / d * 40, by = my + dx / d * 40;  // bezier control bend

    const isSel = selId && (s.id === selId || t.id === selId);
    const stroke  = isSel ? '#539bf5' : '#3a4a5c';
    const markerRef = isSel ? '#arr-sel' : '#arr-def';
    const sw      = isSel ? 1.8 : 1;
    const op      = isSel ? 0.9 : 0.45;

    html += `<path d="M${s.x},${s.y} Q${bx},${by} ${ex},${ey}" fill="none" ` +
            `stroke="${stroke}" stroke-width="${sw}" opacity="${op}" ` +
            `marker-end="url(${markerRef})"/>`;

    if (e.label) {
      const lx = bx * 0.6 + (s.x + ex) / 2 * 0.4;
      const ly = by * 0.6 + (s.y + ey) / 2 * 0.4;
      html += `<text x="${lx}" y="${ly}" text-anchor="middle" ` +
              `font-size="9.5" fill="${isSel ? '#8b949e' : '#4d5a66'}" ` +
              `font-family="-apple-system,BlinkMacSystemFont,sans-serif">${esc(e.label)}</text>`;
    }
  }
  svgG.innerHTML = html;
}

// ── Select / deselect node ───────────────────────────────────────────
function selectNode(idx) {
  if (selectedIdx >= 0 && simNodes[selectedIdx]?.card)
    simNodes[selectedIdx].card.classList.remove('selected');

  selectedIdx = idx;
  const sn = simNodes[idx];
  if (sn?.card) sn.card.classList.add('selected');

  renderEdges();   // highlight connected edges

  const n = graphData.nodes[idx];
  if (!n) return;

  const col = typeColor(n.node_type);
  const detail = document.getElementById('mg-detail');
  detail.classList.add('show');

  document.getElementById('mgd-title').textContent = n.title || n.id;
  document.getElementById('mgd-title').style.color  = col;

  const outLinks = simEdges.filter(e => e.si === idx);
  const inLinks  = simEdges.filter(e => e.ti === idx);
  const imp      = (n.importance || 0).toFixed(2);
  const impFill  = Math.min(5, Math.round((n.importance || 0) * 5));

  let bodyHtml =
    `<div class="mgd-type-row">` +
      `<span class="mgn-type" style="background:${col}22;color:${col}">${esc(n.node_type || 'node')}</span>` +
      `<span class="mgd-imp">importance: ${imp}</span>` +
      `<span style="font-size:10px;color:${col};margin-left:4px">${'●'.repeat(impFill)}${'◦'.repeat(5 - impFill)}</span>` +
    `</div>` +
    `<div class="mgd-id">${esc(n.id)}</div>`;

  if (n.summary) {
    bodyHtml += `<div class="mgd-summary">${esc(n.summary)}</div>`;
  }

  if (outLinks.length || inLinks.length) {
    bodyHtml += `<div class="mgd-section-label">Links (${outLinks.length + inLinks.length})</div>`;
    outLinks.forEach(e => {
      const tn = graphData.nodes[e.ti];
      bodyHtml += `<div class="mgd-link-out">→ <b onclick="selectNode(${e.ti})" style="cursor:pointer">${esc(tn?.title || tn?.id || '?')}</b>` +
        (e.label ? `<span class="mgd-link-label">${esc(e.label)}</span>` : '') + `</div>`;
    });
    inLinks.forEach(e => {
      const sno = graphData.nodes[e.si];
      bodyHtml += `<div class="mgd-link-in">← <b onclick="selectNode(${e.si})" style="cursor:pointer">${esc(sno?.title || sno?.id || '?')}</b>` +
        (e.label ? `<span class="mgd-link-label">${esc(e.label)}</span>` : '') + `</div>`;
    });
  }

  if (n.body_preview) {
    bodyHtml += `<div class="mgd-section-label">Content</div>` +
                `<div class="mgd-body-text">${esc(n.body_preview)}</div>`;
  }

  document.getElementById('mgd-body').innerHTML = bodyHtml;
}

function closeDetail() {
  if (selectedIdx >= 0 && simNodes[selectedIdx]?.card)
    simNodes[selectedIdx].card.classList.remove('selected');
  selectedIdx = -1;
  document.getElementById('mg-detail').classList.remove('show');
  renderEdges();
}

// ── Search filter ────────────────────────────────────────────────────
function filterNodes(q) {
  q = q.trim().toLowerCase();
  simNodes.forEach((sn, i) => {
    if (!sn.card) return;
    const n = graphData.nodes[i];
    const match = !q ||
      (n.title || '').toLowerCase().includes(q) ||
      (n.id   || '').toLowerCase().includes(q) ||
      (n.node_type || '').toLowerCase().includes(q) ||
      (n.summary   || '').toLowerCase().includes(q) ||
      (n.body_preview || '').toLowerCase().includes(q);
    sn.card.style.opacity = match ? '1' : '0.12';
  });
}

// ── Stats ────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('mg-stats').textContent =
    `${graphData.nodes.length} nodes · ${graphData.edges.length} edges`;
}

// ── Pan / zoom ───────────────────────────────────────────────────────
function applyTransform() {
  document.getElementById('mg-world').style.transform =
    `translate(${gTx}px,${gTy}px) scale(${gScale})`;
}

function centerView() {
  if (!simNodes.length || !document.getElementById('mg-canvas-wrap')) return;
  const wrap = document.getElementById('mg-canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  if (W <= 0 || H <= 0) return;

  let x0 = Infinity, x1 = -Infinity, y0 = Infinity, y1 = -Infinity;
  for (const n of simNodes) {
    x0 = Math.min(x0, n.x); x1 = Math.max(x1, n.x);
    y0 = Math.min(y0, n.y); y1 = Math.max(y1, n.y);
  }
  const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
  const gw = (x1 - x0) + 300, gh = (y1 - y0) + 240;
  gScale = Math.max(0.15, Math.min(1.5, Math.min(W / gw, H / gh) * 0.88));
  gTx = W / 2 - cx * gScale;
  gTy = H / 2 - cy * gScale;
  applyTransform();
}

// ── Node drag ────────────────────────────────────────────────────────
function startNodeDrag(e, idx) {
  dragNodeIdx = idx;
  simNodes[idx].pinned = true;
  const wrap    = document.getElementById('mg-canvas-wrap');
  const rect    = wrap.getBoundingClientRect();
  dnOX = (e.clientX - rect.left - gTx) / gScale - simNodes[idx].x;
  dnOY = (e.clientY - rect.top  - gTy) / gScale - simNodes[idx].y;
}

// ── Canvas event listeners (wired after DOM ready) ───────────────────
function initCanvasEvents() {
  const wrap = document.getElementById('mg-canvas-wrap');
  if (!wrap) return;

  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    const rect  = wrap.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    const prev  = gScale;
    gScale = Math.max(0.08, Math.min(4, gScale * (e.deltaY < 0 ? 1.12 : 0.9)));
    gTx = cx - (cx - gTx) * (gScale / prev);
    gTy = cy - (cy - gTy) * (gScale / prev);
    applyTransform();
  }, { passive: false });

  wrap.addEventListener('mousedown', e => {
    if (dragNodeIdx >= 0) return;
    isPanning = true;
    panSX = e.clientX; panSY = e.clientY;
    panTX0 = gTx;      panTY0 = gTy;
    wrap.classList.add('panning');
  });

  window.addEventListener('mousemove', e => {
    if (dragNodeIdx >= 0) {
      const wrap2 = document.getElementById('mg-canvas-wrap');
      if (!wrap2) return;
      const rect = wrap2.getBoundingClientRect();
      const wx = (e.clientX - rect.left - gTx) / gScale - dnOX;
      const wy = (e.clientY - rect.top  - gTy) / gScale - dnOY;
      simNodes[dragNodeIdx].x = wx;
      simNodes[dragNodeIdx].y = wy;
      simNodes[dragNodeIdx].vx = 0;
      simNodes[dragNodeIdx].vy = 0;
      positionCards();
      renderEdges();
    } else if (isPanning) {
      gTx = panTX0 + (e.clientX - panSX);
      gTy = panTY0 + (e.clientY - panSY);
      applyTransform();
    }
  });

  window.addEventListener('mouseup', () => {
    if (dragNodeIdx >= 0) {
      simNodes[dragNodeIdx].pinned = false;
      dragNodeIdx  = -1;
    }
    isPanning = false;
    const wrap2 = document.getElementById('mg-canvas-wrap');
    if (wrap2) wrap2.classList.remove('panning');
  });

  // Click on empty canvas → deselect
  wrap.addEventListener('click', e => {
    if (e.target === wrap || e.target === document.getElementById('mg-world') ||
        e.target === document.getElementById('mg-svg') ||
        e.target === document.getElementById('mg-nodes-layer')) {
      closeDetail();
    }
  });
}

// Wire canvas events (script runs at end of body, DOM is already ready)
initCanvasEvents();
</script>
</body>
