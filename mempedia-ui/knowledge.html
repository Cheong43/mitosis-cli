<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mempedia — 核心知识库</title>
<style>
:root{
  --bg:#0d1117;--sb:#161b22;--sf:#1c2128;--sf2:#22272e;--bd:#2d333b;--bds:#21262d;
  --tx:#adbac7;--tx2:#cdd9e5;--dim:#636e7b;--acc:#539bf5;--acc2:#1f3d6e;
  --grn:#46954a;--ylw:#c69026;--red:#e5534b;--pur:#b392f0;--cyn:#39c5cf;
  --sbw:280px;--hh:52px;--r:8px;--rs:5px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:13px;background:var(--bg);color:var(--tx);line-height:1.55}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
textarea,input{font:inherit;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}

/* ── App shell ── */
#app{display:flex;flex-direction:column;height:100vh}

/* ── Header ── */
header{display:flex;align-items:center;height:var(--hh);padding:0 16px;background:var(--sb);border-bottom:1px solid var(--bd);flex-shrink:0;gap:12px}
.h-logo{font-weight:700;font-size:15px;color:var(--tx2);letter-spacing:-0.3px;white-space:nowrap}
.h-logo span{color:var(--acc)}
.h-nav{display:flex;gap:4px;flex:1}
.h-nav button{padding:5px 12px;border-radius:var(--rs);font-size:12.5px;color:var(--dim);transition:background .12s,color .12s}
.h-nav button:hover{background:var(--sf);color:var(--tx)}
.h-nav button.act{background:var(--sf2);color:var(--tx2)}
.h-search{display:flex;align-items:center;gap:6px;padding:0 10px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);flex:0 0 260px}
.h-search input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:13px;padding:5px 0}
.h-search input::placeholder{color:var(--dim)}
.h-search button{color:var(--dim);font-size:14px;padding:2px 4px;border-radius:3px}
.h-search button:hover{color:var(--acc)}
.h-status{font-size:11.5px;color:var(--dim);display:flex;align-items:center;gap:6px;white-space:nowrap}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0}
.sdot.err{background:var(--red)}
.sdot.busy{background:var(--ylw);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Body ── */
.body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:var(--sbw);background:var(--sb);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 8px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}
#btn-new-node{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:var(--rs);background:var(--acc2);color:var(--acc);font-size:12px;font-weight:500;transition:background .15s,color .15s}
#btn-new-node:hover{background:var(--acc);color:#fff}
#node-list{flex:1;overflow-y:auto;padding:4px 6px 12px}
.ni{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:var(--rs);cursor:pointer;transition:background .12s}
.ni:hover{background:var(--sf)}
.ni.act{background:var(--sf2)}
.ni-icon{flex-shrink:0;width:20px;height:20px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px}
.ni-body{flex:1;min-width:0}
.ni-title{font-size:12.5px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.ni.act .ni-title{color:var(--tx2)}
.ni-id{font-size:10.5px;color:var(--dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni-meta{display:flex;gap:6px;margin-top:3px}
.badge{display:inline-flex;align-items:center;padding:1px 5px;border-radius:10px;font-size:10.5px;font-weight:500}
.imp-high{background:#2d4a2d;color:var(--grn)}
.imp-mid{background:#3a3018;color:var(--ylw)}
.imp-low{background:#2a2a2a;color:var(--dim)}

/* ── Main area ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── Views ── */
.view{display:none;flex:1;overflow:hidden}
.view.act{display:flex;flex-direction:column}

/* ── Graph view ── */
#graph-view{position:relative}
#graph-canvas{width:100%;height:100%;cursor:grab}
#graph-canvas.dragging{cursor:grabbing}
.graph-controls{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:6px}
.graph-controls button{width:32px;height:32px;border-radius:var(--r);background:var(--sb);border:1px solid var(--bd);color:var(--tx);font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.graph-controls button:hover{background:var(--sf2)}
.graph-tooltip{position:absolute;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;pointer-events:none;max-width:240px;opacity:0;transition:opacity .15s;z-index:10}
.graph-tooltip.show{opacity:1}

/* ── Editor view ── */
#editor-view{background:var(--bg)}
.editor-toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sb);flex-shrink:0}
.editor-toolbar .node-id-display{font-size:12px;color:var(--dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.editor-toolbar .node-id-display span{color:var(--acc);font-family:monospace}
.ed-btn{padding:5px 12px;border-radius:var(--rs);font-size:12px;font-weight:500;transition:background .12s,color .12s;color:var(--dim)}
.ed-btn:hover{background:var(--sf);color:var(--tx)}
.ed-btn.primary{background:var(--acc);color:#fff}
.ed-btn.primary:hover{opacity:.9}
.ed-btn.danger{color:var(--red)}
.ed-btn.danger:hover{background:#2d1a1a;color:var(--red)}
.editor-cols{display:flex;flex:1;overflow:hidden;gap:0}
.editor-md{display:flex;flex-direction:column;flex:1;border-right:1px solid var(--bd)}
.editor-md textarea{flex:1;width:100%;background:var(--bg);border:none;outline:none;padding:20px 24px;resize:none;color:var(--tx);font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:13px;line-height:1.7}
.editor-preview{flex:0 0 44%;overflow-y:auto;padding:20px 24px;background:var(--sf)}
.preview-content{color:var(--tx);line-height:1.8}
.preview-content h1{font-size:20px;color:var(--tx2);margin:0 0 12px;border-bottom:1px solid var(--bd);padding-bottom:8px}
.preview-content h2{font-size:16px;color:var(--tx2);margin:16px 0 8px}
.preview-content h3{font-size:14px;color:var(--tx2);margin:12px 0 6px}
.preview-content p{margin:6px 0}
.preview-content code{font-family:monospace;font-size:12px;background:var(--sf2);padding:1px 5px;border-radius:3px;color:#e6db74}
.preview-content pre{background:var(--sf2);border-radius:var(--r);padding:14px;overflow-x:auto;margin:10px 0}
.preview-content pre code{background:none;padding:0;color:var(--tx)}
.preview-content ul,
.preview-content ol{padding-left:20px;margin:6px 0}
.preview-content li{margin:3px 0}
.preview-content blockquote{border-left:3px solid var(--acc);margin:8px 0;padding:6px 12px;color:var(--dim)}
.editor-aside{flex:0 0 260px;border-left:1px solid var(--bd);background:var(--sb);display:flex;flex-direction:column;overflow:hidden}
.aside-section{padding:12px 14px;border-bottom:1px solid var(--bds)}
.aside-label{font-size:10.5px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.aside-field input{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:6px 8px;color:var(--tx);outline:none;font-size:12px}
.aside-field input:focus{border-color:var(--acc)}
.aside-field label{display:block;font-size:11.5px;color:var(--dim);margin-bottom:4px}
.importance-slider{width:100%;accent-color:var(--acc)}
.link-list{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto}
.link-item{display:flex;align-items:center;gap:6px;padding:4px 6px;background:var(--sf);border-radius:var(--rs);font-size:12px}
.link-item .link-target{flex:1;color:var(--acc);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.link-item .link-label{color:var(--dim);font-size:11px;flex:0 0 60px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-item .link-del{color:var(--dim);font-size:13px;flex-shrink:0}
.link-item .link-del:hover{color:var(--red)}
.link-add-row{display:flex;gap:4px;margin-top:6px}
.link-add-row input{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:4px 6px;color:var(--tx);outline:none;font-size:12px;min-width:0}
.link-add-row input:focus{border-color:var(--acc)}
.link-add-row button{padding:4px 8px;background:var(--acc2);color:var(--acc);border-radius:var(--rs);font-size:12px;flex-shrink:0}
.link-add-row button:hover{background:var(--acc);color:#fff}

/* ── History view ── */
#history-view{flex-direction:column}
.hist-toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sb);flex-shrink:0}
.hist-toolbar .ht-title{font-size:14px;color:var(--tx2);font-weight:600;flex:1}
#hist-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.hist-card{background:var(--sb);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:border-color .12s}
.hist-card:hover{border-color:var(--acc)}
.hist-card.active{border-color:var(--acc);background:var(--sf)}
.hist-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hist-hash{font-family:monospace;font-size:11.5px;color:var(--acc);background:var(--acc2);padding:2px 6px;border-radius:3px}
.hist-ts{font-size:11.5px;color:var(--dim)}
.hist-agent{font-size:11.5px;color:var(--pur);margin-left:auto}
.hist-reason{font-size:12.5px;color:var(--tx);line-height:1.5}
.hist-source{font-size:11px;color:var(--dim);margin-top:4px}
.hist-parent{font-size:11px;color:var(--dim)}
.hist-body-preview{margin-top:8px;font-size:12px;color:var(--dim);white-space:pre-wrap;max-height:80px;overflow:hidden;position:relative}
.hist-body-preview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent, var(--sb))}
.hist-restore-btn{margin-top:8px;padding:5px 12px;border-radius:var(--rs);background:var(--sf2);color:var(--ylw);font-size:12px;transition:background .12s}
.hist-restore-btn:hover{background:var(--ylw);color:#000}

/* ── Search view ── */
#search-view{flex-direction:column}
.search-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--sb);flex-shrink:0}
.search-bar input{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:8px 12px;color:var(--tx);outline:none;font-size:13px}
.search-bar input:focus{border-color:var(--acc)}
.search-bar button{padding:8px 16px;background:var(--acc);color:#fff;border-radius:var(--rs);font-size:13px;flex-shrink:0}
.search-bar button:hover{opacity:.9}
#search-results{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.sr-card{background:var(--sb);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:border-color .12s}
.sr-card:hover{border-color:var(--acc)}
.sr-top{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.sr-title{font-size:14px;font-weight:600;color:var(--tx2)}
.sr-score{font-size:11px;color:var(--dim);margin-left:auto;background:var(--sf2);padding:1px 6px;border-radius:10px}
.sr-id{font-size:12px;color:var(--acc);font-family:monospace}
.sr-summary{font-size:12.5px;color:var(--tx);margin-top:4px;line-height:1.5}
.sr-highlight{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.5}
.sr-highlight mark{background:#3a3800;color:var(--ylw);border-radius:2px;padding:0 2px}
.sr-empty{text-align:center;padding:60px 20px;color:var(--dim)}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:100;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ok{background:#1a3a1a;color:var(--grn);border:1px solid var(--grn)}
#toast.err{background:#2d1a1a;color:var(--red);border:1px solid var(--red)}
#toast.info{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd)}

/* ── Empty state ── */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--dim)}
.empty-icon{font-size:44px;opacity:.4}
.empty-label{font-size:14px}

/* ── Spinner ── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-backdrop.show{opacity:1;pointer-events:all}
.modal{background:var(--sb);border:1px solid var(--bd);border-radius:var(--r);padding:20px 24px;min-width:360px;max-width:520px;width:100%}
.modal h3{font-size:15px;color:var(--tx2);margin-bottom:14px}
.modal label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px;margin-top:10px}
.modal input,.modal textarea{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:7px 10px;color:var(--tx);outline:none;font-size:13px}
.modal input:focus,.modal textarea:focus{border-color:var(--acc)}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal-btns button{padding:6px 14px;border-radius:var(--rs);font-size:13px;font-weight:500}
.modal-btns .btn-cancel{color:var(--dim)}
.modal-btns .btn-cancel:hover{background:var(--sf2);color:var(--tx)}
.modal-btns .btn-ok{background:var(--acc);color:#fff}
.modal-btns .btn-ok:hover{opacity:.9}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <header>
    <div class="h-logo">Mem<span>pedia</span> <span style="font-weight:400;color:var(--dim);font-size:12px">核心知识库</span></div>
    <nav class="h-nav">
      <button class="act" data-view="graph">🗺 图谱</button>
      <button data-view="editor">✏️ 编辑器</button>
      <button data-view="history">🕒 历史</button>
      <button data-view="search">🔍 搜索</button>
    </nav>
    <div class="h-search">
      <input type="text" id="quick-search" placeholder="快速搜索节点…" />
      <button id="quick-search-btn">↵</button>
    </div>
    <div class="h-status">
      <span class="sdot" id="status-dot"></span>
      <span id="status-text">就绪</span>
    </div>
  </header>

  <!-- Body -->
  <div class="body">
    <!-- Sidebar: node list -->
    <aside class="sidebar">
      <div class="sb-hd">
        <span>节点</span>
        <button id="btn-new-node">+ 新建</button>
      </div>
      <div id="node-list"></div>
    </aside>

    <!-- Graph view -->
    <div class="view act" id="graph-view">
      <canvas id="graph-canvas"></canvas>
      <div class="graph-tooltip" id="graph-tooltip"></div>
      <div class="graph-controls">
        <button id="gc-fit" title="适应窗口">⊡</button>
        <button id="gc-zoom-in" title="放大">+</button>
        <button id="gc-zoom-out" title="缩小">−</button>
      </div>
    </div>

    <!-- Editor view -->
    <div class="view" id="editor-view">
      <div class="editor-toolbar">
        <div class="node-id-display" id="editor-node-id-display">选择左侧节点以编辑</div>
        <button class="ed-btn" id="ed-btn-reload" title="重新加载" style="display:none">↺ 重载</button>
        <button class="ed-btn" id="ed-btn-history" title="查看该节点历史" style="display:none">🕒 历史</button>
        <button class="ed-btn primary" id="ed-btn-save" style="display:none">保存</button>
      </div>
      <div class="editor-cols" id="editor-cols" style="display:none">
        <div class="editor-md">
          <textarea id="md-editor" spellcheck="false" placeholder="在此输入 Markdown 内容…"></textarea>
        </div>
        <div class="editor-preview">
          <div class="preview-content" id="md-preview"></div>
        </div>
        <aside class="editor-aside">
          <div class="aside-section">
            <div class="aside-label">节点元信息</div>
            <div class="aside-field">
              <label>节点 ID</label>
              <input type="text" id="aside-node-id" readonly />
            </div>
            <div class="aside-field" style="margin-top:8px">
              <label>重要度 (<span id="imp-val">0.5</span>)</label>
              <input type="range" class="importance-slider" id="importance-slider" min="0" max="1" step="0.05" value="0.5" />
            </div>
            <div class="aside-field" style="margin-top:8px">
              <label>修改原因</label>
              <input type="text" id="aside-reason" placeholder="说明此次修改目的…" />
            </div>
          </div>
          <div class="aside-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
            <div class="aside-label">知识链接</div>
            <div class="link-list" id="link-list"></div>
            <div class="link-add-row">
              <input type="text" id="link-target-input" placeholder="目标节点 ID" />
              <input type="text" id="link-label-input" placeholder="标签" style="flex:0 0 60px" />
              <button id="btn-add-link">+</button>
            </div>
          </div>
        </aside>
      </div>
      <div class="empty-state" id="editor-empty">
        <div class="empty-icon">📄</div>
        <div class="empty-label">从左侧选择节点开始编辑，或点击「新建」</div>
      </div>
    </div>

    <!-- History view -->
    <div class="view" id="history-view">
      <div class="hist-toolbar">
        <div class="ht-title" id="hist-view-title">版本历史</div>
        <button class="ed-btn" id="hist-back-btn">← 返回编辑</button>
      </div>
      <div id="hist-list"></div>
    </div>

    <!-- Search view -->
    <div class="view" id="search-view">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="搜索知识节点…" />
        <button id="search-btn">搜索</button>
      </div>
      <div id="search-results">
        <div class="sr-empty">输入关键词开始搜索</div>
      </div>
    </div>
  </div>
</div>

<!-- New node modal -->
<div class="modal-backdrop" id="new-node-modal">
  <div class="modal">
    <h3>新建知识节点</h3>
    <label>节点 ID（唯一标识，小写字母/数字/连字符）</label>
    <input type="text" id="new-node-id" placeholder="e.g. user/alice/profile" />
    <label>标题</label>
    <input type="text" id="new-node-title" placeholder="节点标题…" />
    <label>摘要（可选）</label>
    <input type="text" id="new-node-summary" placeholder="一句话描述…" />
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">取消</button>
      <button class="btn-ok" id="modal-ok">创建</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
const state = {
  nodes: [],        // [{id, title, summary, importance, node_type, parent_node, links}]
  edges: [],        // [{source, target, label, weight}]
  selectedNodeId: null,
  editorDirty: false,
  editorLinks: [],  // current node links being edited
  historyNodeId: null,
  view: 'graph',
  loading: false,
};

// ── DOM refs ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const statusDot = $('status-dot');
const statusText = $('status-text');
const toast = $('toast');
const nodeList = $('node-list');
const mdEditor = $('md-editor');
const mdPreview = $('md-preview');
const editorNodeIdDisplay = $('editor-node-id-display');
const editorCols = $('editor-cols');
const editorEmpty = $('editor-empty');
const edBtnSave = $('ed-btn-save');
const edBtnReload = $('ed-btn-reload');
const edBtnHistory = $('ed-btn-history');
const asideNodeId = $('aside-node-id');
const impSlider = $('importance-slider');
const impVal = $('imp-val');
const asideReason = $('aside-reason');
const linkList = $('link-list');
const linkTargetInput = $('link-target-input');
const linkLabelInput = $('link-label-input');
const histList = $('hist-list');
const histViewTitle = $('hist-view-title');
const histBackBtn = $('hist-back-btn');
const searchInput = $('search-input');
const searchResults = $('search-results');

// ── Utilities ────────────────────────────────────────────────────────────────
function showToast(msg, type = 'info', dur = 3000) {
  toast.textContent = msg;
  toast.className = `show ${type}`;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.className = ''; }, dur);
}

function setBusy(busy) {
  state.loading = busy;
  statusDot.className = 'sdot' + (busy ? ' busy' : '');
  statusText.textContent = busy ? '处理中…' : '就绪';
}

function setError(msg) {
  statusDot.className = 'sdot err';
  statusText.textContent = msg;
  setTimeout(() => { statusDot.className = 'sdot'; statusText.textContent = '就绪'; }, 4000);
}

async function api(path, opts = {}) {
  const r = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  let data;
  try { data = await r.json(); } catch { data = {}; }
  if (!r.ok || data.ok === false) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

function tsToDate(ts) {
  if (!ts) return '';
  const ms = ts > 1e12 ? ts : ts * 1000;
  return new Date(ms).toLocaleString('zh-CN', { dateStyle: 'short', timeStyle: 'short' });
}

function impBadge(imp) {
  if (imp >= 0.7) return `<span class="badge imp-high">重要 ${imp.toFixed(1)}</span>`;
  if (imp >= 0.4) return `<span class="badge imp-mid">普通 ${imp.toFixed(1)}</span>`;
  return `<span class="badge imp-low">低 ${imp.toFixed(1)}</span>`;
}

function typeIcon(ntype) {
  const map = {
    'user': '👤', 'agent': '🤖', 'project': '📁', 'skill': '🎯',
    'concept': '💡', 'preference': '⭐', 'episodic': '📅', 'fact': '🔖',
  };
  if (!ntype) return '📝';
  for (const [k, v] of Object.entries(map)) if (ntype.includes(k)) return v;
  return '📝';
}

// ── Markdown renderer (lightweight) ─────────────────────────────────────────
function renderMarkdown(md) {
  if (!md) return '';
  let s = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Code blocks
  s = s.replace(/```[\w]*\n([\s\S]*?)```/g, (_,c) => `<pre><code>${c.trim()}</code></pre>`);
  // Inline code
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold / italic
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Blockquote
  s = s.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Lists
  s = s.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  s = s.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  s = s.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Horizontal rule
  s = s.replace(/^---$/gm,'<hr/>');
  // Paragraph breaks
  s = s.replace(/\n\n+/g, '</p><p>');
  return `<p>${s}</p>`;
}

// ── View switching ────────────────────────────────────────────────────────────
function switchView(name) {
  state.view = name;
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('act', v.id === `${name}-view`));
  document.querySelectorAll('.h-nav button').forEach(b => b.classList.toggle('act', b.dataset.view === name));
}

document.querySelectorAll('.h-nav button').forEach(b => {
  b.addEventListener('click', () => switchView(b.dataset.view));
});

// ── Load graph ────────────────────────────────────────────────────────────────
async function loadGraph() {
  setBusy(true);
  try {
    const data = await api('/api/memory/graph');
    state.nodes = data.nodes || [];
    state.edges = data.edges || [];
    renderNodeList();
    drawGraph();
  } catch(e) {
    setError(e.message);
    showToast('加载图谱失败: ' + e.message, 'err');
  } finally {
    setBusy(false);
  }
}

// ── Sidebar node list ─────────────────────────────────────────────────────────
function renderNodeList() {
  nodeList.innerHTML = '';
  const sorted = [...state.nodes].sort((a,b) => (b.importance||0)-(a.importance||0));
  sorted.forEach(node => {
    const el = document.createElement('div');
    el.className = 'ni' + (state.selectedNodeId === node.id ? ' act' : '');
    el.dataset.id = node.id;
    el.innerHTML = `
      <div class="ni-icon" style="background:var(--sf2)">${typeIcon(node.node_type)}</div>
      <div class="ni-body">
        <div class="ni-title">${escHtml(node.title || node.id)}</div>
        <div class="ni-id">${escHtml(node.id)}</div>
        <div class="ni-meta">${impBadge(node.importance||0)}</div>
      </div>`;
    el.addEventListener('click', () => selectNode(node.id));
    nodeList.appendChild(el);
  });
  if (!sorted.length) {
    nodeList.innerHTML = '<div style="padding:20px 12px;color:var(--dim);font-size:12px;text-align:center">暂无节点，点击「新建」添加第一个知识节点</div>';
  }
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Select & open node ────────────────────────────────────────────────────────
async function selectNode(nodeId, openEditor = true) {
  state.selectedNodeId = nodeId;
  renderNodeList();
  if (openEditor) {
    switchView('editor');
    await openNodeInEditor(nodeId);
  }
}

async function openNodeInEditor(nodeId) {
  setBusy(true);
  try {
    const data = await api(`/api/memory/node?node_id=${encodeURIComponent(nodeId)}`);
    const markdown = data.markdown || '';
    // Populate editor
    mdEditor.value = markdown;
    updatePreview();
    asideNodeId.value = nodeId;
    editorNodeIdDisplay.innerHTML = `节点: <span>${escHtml(nodeId)}</span>`;
    // Try to find node meta from graph state
    const meta = state.nodes.find(n => n.id === nodeId);
    impSlider.value = meta?.importance ?? 0.5;
    impVal.textContent = parseFloat(impSlider.value).toFixed(2);
    // Links
    state.editorLinks = (meta?.links || []).map(l => ({...l}));
    renderLinkList();
    editorCols.style.display = 'flex';
    editorEmpty.style.display = 'none';
    edBtnSave.style.display = '';
    edBtnReload.style.display = '';
    edBtnHistory.style.display = '';
    state.editorDirty = false;
    asideReason.value = '';
  } catch(e) {
    showToast('加载节点失败: ' + e.message, 'err');
    setError(e.message);
  } finally {
    setBusy(false);
  }
}

// ── Editor ──────────────────────────────────────────────────────────────────
impSlider.addEventListener('input', () => {
  impVal.textContent = parseFloat(impSlider.value).toFixed(2);
  state.editorDirty = true;
});

mdEditor.addEventListener('input', () => {
  updatePreview();
  state.editorDirty = true;
});

function updatePreview() {
  mdPreview.innerHTML = renderMarkdown(mdEditor.value);
}

edBtnSave.addEventListener('click', saveNode);
edBtnReload.addEventListener('click', () => {
  if (state.selectedNodeId) openNodeInEditor(state.selectedNodeId);
});
edBtnHistory.addEventListener('click', () => {
  if (state.selectedNodeId) showHistory(state.selectedNodeId);
});

async function saveNode() {
  const nodeId = asideNodeId.value.trim();
  if (!nodeId) { showToast('缺少节点 ID', 'err'); return; }
  const markdown = mdEditor.value;
  if (!markdown.trim()) { showToast('内容不能为空', 'err'); return; }
  const reason = asideReason.value.trim() || '手动编辑';
  if (reason.length < 3) { showToast('请输入至少3个字符的修改原因', 'err'); return; }

  setBusy(true);
  try {
    await api('/api/memory/node/save', {
      method: 'POST',
      body: JSON.stringify({
        node_id: nodeId,
        markdown,
        graph_links: state.editorLinks,
        agent_id: 'human-editor',
        reason,
        source: 'mempedia-ui-knowledge',
        importance: parseFloat(impSlider.value),
      }),
    });
    state.editorDirty = false;
    showToast('✓ 保存成功', 'ok');
    await loadGraph();
  } catch(e) {
    showToast('保存失败: ' + e.message, 'err');
  } finally {
    setBusy(false);
  }
}

// ── Link management ──────────────────────────────────────────────────────────
function renderLinkList() {
  linkList.innerHTML = '';
  state.editorLinks.forEach((link, i) => {
    const el = document.createElement('div');
    el.className = 'link-item';
    el.innerHTML = `
      <span class="link-target" title="${escHtml(link.target)}">${escHtml(link.target)}</span>
      <span class="link-label">${escHtml(link.label||'')}</span>
      <button class="link-del" title="移除">×</button>`;
    el.querySelector('.link-target').addEventListener('click', () => selectNode(link.target));
    el.querySelector('.link-del').addEventListener('click', () => {
      state.editorLinks.splice(i, 1);
      state.editorDirty = true;
      renderLinkList();
    });
    linkList.appendChild(el);
  });
  if (!state.editorLinks.length) {
    linkList.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:4px 0">尚无链接</div>';
  }
}

$('btn-add-link').addEventListener('click', () => {
  const target = linkTargetInput.value.trim();
  if (!target) { showToast('请输入目标节点 ID', 'err'); return; }
  const label = linkLabelInput.value.trim();
  if (state.editorLinks.some(l => l.target === target)) {
    showToast('该链接已存在', 'err');
    return;
  }
  state.editorLinks.push({ target, label: label || undefined, weight: 1.0 });
  linkTargetInput.value = '';
  linkLabelInput.value = '';
  state.editorDirty = true;
  renderLinkList();
});

// ── History view ──────────────────────────────────────────────────────────────
histBackBtn.addEventListener('click', () => {
  if (state.historyNodeId) switchView('editor');
  else switchView('graph');
});

async function showHistory(nodeId) {
  state.historyNodeId = nodeId;
  histViewTitle.textContent = `历史版本 — ${nodeId}`;
  switchView('history');
  histList.innerHTML = '<div style="padding:20px;color:var(--dim);display:flex;align-items:center;gap:8px"><span class="spinner"></span> 加载历史…</div>';
  try {
    const data = await api(`/api/memory/node/history?node_id=${encodeURIComponent(nodeId)}`);
    const items = data.items || [];
    if (!items.length) {
      histList.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-label">无历史版本</div></div>';
      return;
    }
    histList.innerHTML = '';
    items.forEach((item, idx) => {
      const c = item.content || {};
      const sd = c.structured_data || {};
      const agentId = sd['kb.last_agent_id'] || item.agent_id || '—';
      const reason = sd['kb.last_reason'] || item.reason || '';
      const source = sd['kb.last_source'] || item.source || '';
      const card = document.createElement('div');
      card.className = 'hist-card' + (idx === 0 ? ' active' : '');
      card.innerHTML = `
        <div class="hist-top">
          <span class="hist-hash">${item.version.slice(0,8)}</span>
          <span class="hist-ts">${tsToDate(item.timestamp)}</span>
          ${idx===0?'<span class="badge imp-high" style="margin-left:auto">当前</span>':''}
          <span class="hist-agent">${escHtml(agentId)}</span>
        </div>
        ${reason ? `<div class="hist-reason">${escHtml(reason)}</div>` : ''}
        ${source ? `<div class="hist-source">来源: ${escHtml(source)}</div>` : ''}
        ${item.parents?.length ? `<div class="hist-parent">父版本: ${item.parents.map(p=>escHtml(p.slice(0,8))).join(', ')}</div>` : ''}
        <div class="hist-body-preview">${escHtml((c.body||'').slice(0,200))}</div>
        ${idx > 0 ? `<button class="hist-restore-btn" data-version="${escHtml(item.version)}">↺ 恢复此版本</button>` : ''}`;
      card.querySelector('.hist-restore-btn')?.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm(`确定要将「${nodeId}」回滚到版本 ${item.version.slice(0,8)} 吗？`)) return;
        await restoreVersion(nodeId, item.version);
      });
      histList.appendChild(card);
    });
  } catch(e) {
    histList.innerHTML = `<div style="padding:20px;color:var(--red)">加载失败: ${escHtml(e.message)}</div>`;
  }
}

async function restoreVersion(nodeId, version) {
  setBusy(true);
  try {
    await api('/api/memory/action', {
      method: 'POST',
      body: JSON.stringify({
        action: 'rollback_node',
        node_id: nodeId,
        target_version: version,
        importance: 0.5,
        agent_id: 'human-editor',
        reason: '手动回滚至历史版本',
      }),
    });
    showToast('✓ 已回滚至指定版本', 'ok');
    await loadGraph();
    await showHistory(nodeId);
  } catch(e) {
    showToast('回滚失败: ' + e.message, 'err');
  } finally {
    setBusy(false);
  }
}

// ── Search view ───────────────────────────────────────────────────────────────
$('search-btn').addEventListener('click', doSearch);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const q = searchInput.value.trim();
  if (!q) return;
  searchResults.innerHTML = '<div style="padding:20px;color:var(--dim);display:flex;align-items:center;gap:8px"><span class="spinner"></span> 搜索中…</div>';
  try {
    const data = await api(`/api/memory/search?query=${encodeURIComponent(q)}&limit=30`);
    const results = data.results || [];
    if (!results.length) {
      searchResults.innerHTML = `<div class="sr-empty">未找到与「${escHtml(q)}」相关的节点</div>`;
      return;
    }
    searchResults.innerHTML = '';
    results.forEach(r => {
      const card = document.createElement('div');
      card.className = 'sr-card';
      card.innerHTML = `
        <div class="sr-top">
          <span class="sr-title">${escHtml(r.title||r.id||r.node_id||'')}</span>
          <span class="sr-score">相关度 ${typeof r.score==='number' ? r.score.toFixed(3) : '—'}</span>
        </div>
        <div class="sr-id">${escHtml(r.id||r.node_id||'')}</div>
        ${r.summary ? `<div class="sr-summary">${escHtml(r.summary)}</div>` : ''}
        ${r.highlight ? `<div class="sr-highlight">…${r.highlight.replace(/\*\*(.+?)\*\*/g,'<mark>$1</mark>')}…</div>` : ''}`;
      card.addEventListener('click', () => selectNode(r.id||r.node_id||''));
      searchResults.appendChild(card);
    });
  } catch(e) {
    searchResults.innerHTML = `<div style="padding:20px;color:var(--red)">搜索失败: ${escHtml(e.message)}</div>`;
  }
}

// ── Quick search ──────────────────────────────────────────────────────────────
$('quick-search-btn').addEventListener('click', () => {
  const q = $('quick-search').value.trim();
  if (!q) return;
  switchView('search');
  searchInput.value = q;
  doSearch();
});
$('quick-search').addEventListener('keydown', e => {

$('btn-new-node').addEventListener('click', () => {
  $('new-node-id').value = '';
  $('new-node-title').value = '';
  $('new-node-summary').value = '';
  $('new-node-modal').classList.add('show');
  setTimeout(() => $('new-node-id').focus(), 100);
});
$('modal-cancel').addEventListener('click', () => $('new-node-modal').classList.remove('show'));
$('modal-ok').addEventListener('click', createNewNode);
$('new-node-modal').addEventListener('click', e => { if (e.target === $('new-node-modal')) $('new-node-modal').classList.remove('show'); });

async function createNewNode() {
  const rawId = $('new-node-id').value.trim();
  const nodeId = rawId.toLowerCase().replace(/[^a-z0-9/\-_]/g, '-').replace(/^-+|-+$/g,'');
  const title = $('new-node-title').value.trim();
  if (!nodeId) { showToast('请输入有效的节点 ID', 'err'); return; }
  if (!title) { showToast('请输入标题', 'err'); return; }
  const summary = $('new-node-summary').value.trim();
  const frontmatter = `---\nnode_id: "${nodeId}"\ntitle: "${title.replace(/"/g,'\\"')}"\n${summary ? `description: "${summary.replace(/"/g,'\\"')}"\n` : ''}---\n\n# ${title}\n\n${summary ? `> ${summary}\n\n` : ''}## 内容\n\n\n`;
  $('new-node-modal').classList.remove('show');
  setBusy(true);
  try {
    await api('/api/memory/node/save', {
      method: 'POST',
      body: JSON.stringify({
        node_id: nodeId,
        markdown: frontmatter,
        graph_links: [],
        agent_id: 'human-editor',
        reason: '创建新知识节点',
        source: 'mempedia-ui-knowledge',
        importance: 0.5,
      }),
    });
    showToast(`✓ 节点「${nodeId}」已创建`, 'ok');
    await loadGraph();
    selectNode(nodeId);
  } catch(e) {
    showToast('创建失败: ' + e.message, 'err');
  } finally {
    setBusy(false);
  }
}

// ── Graph canvas ──────────────────────────────────────────────────────────────
const canvas = $('graph-canvas');
const ctx = canvas.getContext('2d');
let gTransform = { x: 0, y: 0, scale: 1 };
let gDrag = null;
let gNodePositions = {};
let gPinned = {};

function resizeCanvas() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  drawGraph();
}

window.addEventListener('resize', resizeCanvas);

function initLayout() {
  // Simple force-directed placement
  const nodes = state.nodes;
  const n = nodes.length;
  if (!n) return;
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const r = Math.min(canvas.width, canvas.height) * 0.38;
  nodes.forEach((node, i) => {
    if (gNodePositions[node.id] && gPinned[node.id]) return;
    const angle = (2 * Math.PI * i) / n;
    gNodePositions[node.id] = {
      x: cx + r * Math.cos(angle),
      y: cy + r * Math.sin(angle),
    };
  });
  runForceLayout(60);
}

function runForceLayout(iters) {
  const nodes = state.nodes;
  const edges = state.edges;
  const pos = gNodePositions;
  const k = 80;
  for (let iter = 0; iter < iters; iter++) {
    const force = {};
    nodes.forEach(n => { force[n.id] = { x: 0, y: 0 }; });
    // Repulsion
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = (pos[b.id]?.x||0) - (pos[a.id]?.x||0);
        const dy = (pos[b.id]?.y||0) - (pos[a.id]?.y||0);
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const f = (k*k) / dist;
        force[a.id].x -= dx/dist * f;
        force[a.id].y -= dy/dist * f;
        force[b.id].x += dx/dist * f;
        force[b.id].y += dy/dist * f;
      }
    }
    // Attraction
    edges.forEach(e => {
      if (!pos[e.source] || !pos[e.target]) return;
      const dx = pos[e.target].x - pos[e.source].x;
      const dy = pos[e.target].y - pos[e.source].y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const f = (dist*dist) / k;
      force[e.source].x += dx/dist * f;
      force[e.source].y += dy/dist * f;
      force[e.target].x -= dx/dist * f;
      force[e.target].y -= dy/dist * f;
    });
    // Apply
    nodes.forEach(n => {
      if (gPinned[n.id]) return;
      pos[n.id].x += Math.max(-30, Math.min(30, force[n.id].x * 0.1));
      pos[n.id].y += Math.max(-30, Math.min(30, force[n.id].y * 0.1));
    });
  }
}

function drawGraph() {
  if (!canvas.width) return;
  const { x, y, scale } = gTransform;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  const pos = gNodePositions;

  // Edges
  state.edges.forEach(e => {
    const s = pos[e.source], t = pos[e.target];
    if (!s || !t) return;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);
    const w = Math.max(1, (e.weight||1) * 1.5);
    ctx.strokeStyle = state.selectedNodeId && (e.source === state.selectedNodeId || e.target === state.selectedNodeId)
      ? '#539bf5' : '#2d333b';
    ctx.lineWidth = w;
    ctx.stroke();
    // Arrow
    const angle = Math.atan2(t.y - s.y, t.x - s.x);
    const len = Math.sqrt((t.x-s.x)**2+(t.y-s.y)**2);
    if (len > 40) {
      const ax = t.x - Math.cos(angle)*18;
      const ay = t.y - Math.sin(angle)*18;
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax - 7*Math.cos(angle-0.5), ay - 7*Math.sin(angle-0.5));
      ctx.lineTo(ax - 7*Math.cos(angle+0.5), ay - 7*Math.sin(angle+0.5));
      ctx.closePath();
      ctx.fillStyle = ctx.strokeStyle;
      ctx.fill();
    }
    // Edge label
    if (e.label) {
      ctx.fillStyle = '#636e7b';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(e.label, (s.x+t.x)/2, (s.y+t.y)/2 - 4);
    }
  });

  // Nodes
  state.nodes.forEach(node => {
    const p = pos[node.id];
    if (!p) return;
    const isSelected = node.id === state.selectedNodeId;
    const r = 14 + Math.round((node.importance||0) * 12);

    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fillStyle = isSelected ? '#539bf5' : '#22272e';
    ctx.fill();
    ctx.strokeStyle = isSelected ? '#88c0ff' : '#2d333b';
    ctx.lineWidth = isSelected ? 2.5 : 1.5;
    ctx.stroke();

    // Icon
    ctx.font = `${r > 20 ? 14 : 11}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = isSelected ? '#fff' : '#adbac7';
    ctx.fillText(typeIcon(node.node_type), p.x, p.y);

    // Label
    ctx.font = `500 11px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = isSelected ? '#cdd9e5' : '#adbac7';
    const label = (node.title || node.id).slice(0, 22);
    ctx.fillText(label, p.x, p.y + r + 4);
  });

  ctx.restore();
}

// Graph mouse interactions
const tooltip = $('graph-tooltip');
let panStart = null;

canvas.addEventListener('mousedown', e => {
  const p = canvasPoint(e);
  const hit = hitTest(p);
  if (hit) {
    gPinned[hit.id] = true;
    gDrag = { nodeId: hit.id, startX: p.x - gNodePositions[hit.id].x, startY: p.y - gNodePositions[hit.id].y };
  } else {
    panStart = { mx: e.clientX, tx: gTransform.x, ty: gTransform.y, my: e.clientY };
    canvas.classList.add('dragging');
  }
});

canvas.addEventListener('mousemove', e => {
  const p = canvasPoint(e);
  if (gDrag) {
    gNodePositions[gDrag.nodeId] = { x: p.x - gDrag.startX, y: p.y - gDrag.startY };
    drawGraph();
    return;
  }
  if (panStart) {
    gTransform.x = panStart.tx + (e.clientX - panStart.mx);
    gTransform.y = panStart.ty + (e.clientY - panStart.my);
    drawGraph();
    return;
  }
  // Tooltip
  const hit = hitTest(p);
  if (hit) {
    const screenP = worldToScreen(gNodePositions[hit.id]);
    tooltip.style.left = (screenP.x + 20) + 'px';
    tooltip.style.top = (screenP.y - 20) + 'px';
    tooltip.innerHTML = `<strong>${escHtml(hit.title||hit.id)}</strong><br/><span style="color:var(--dim);font-size:11px">${escHtml(hit.id)}</span>${hit.summary?`<br/><span style="font-size:11.5px">${escHtml(hit.summary)}</span>`:''}`;
    tooltip.classList.add('show');
  } else {
    tooltip.classList.remove('show');
  }
});

canvas.addEventListener('mouseup', e => {
  if (gDrag) {
    gDrag = null;
    return;
  }
  if (panStart) {
    canvas.classList.remove('dragging');
    panStart = null;
    return;
  }
  const p = canvasPoint(e);
  const hit = hitTest(p);
  if (hit) selectNode(hit.id);
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 0.88;
  const mx = e.clientX - canvas.getBoundingClientRect().left;
  const my = e.clientY - canvas.getBoundingClientRect().top;
  gTransform.x = mx - (mx - gTransform.x) * factor;
  gTransform.y = my - (my - gTransform.y) * factor;
  gTransform.scale *= factor;
  drawGraph();
}, { passive: false });

function canvasPoint(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left - gTransform.x) / gTransform.scale,
    y: (e.clientY - rect.top - gTransform.y) / gTransform.scale,
  };
}

function worldToScreen(p) {
  return {
    x: p.x * gTransform.scale + gTransform.x,
    y: p.y * gTransform.scale + gTransform.y,
  };
}

function hitTest(p) {
  for (const node of state.nodes) {
    const np = gNodePositions[node.id];
    if (!np) continue;
    const r = 16 + Math.round((node.importance||0) * 12);
    const dx = p.x - np.x, dy = p.y - np.y;
    if (dx*dx + dy*dy <= (r+4)*(r+4)) return node;
  }
  return null;
}

$('gc-fit').addEventListener('click', fitGraph);
$('gc-zoom-in').addEventListener('click', () => { gTransform.scale *= 1.2; drawGraph(); });
$('gc-zoom-out').addEventListener('click', () => { gTransform.scale /= 1.2; drawGraph(); });

function fitGraph() {
  const pList = Object.values(gNodePositions);
  if (!pList.length) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  pList.forEach(p => { minX=Math.min(minX,p.x); minY=Math.min(minY,p.y); maxX=Math.max(maxX,p.x); maxY=Math.max(maxY,p.y); });
  const pw = canvas.width, ph = canvas.height;
  const gw = maxX - minX + 100, gh = maxY - minY + 100;
  const scale = Math.min(pw/gw, ph/gh, 1.5) * 0.9;
  gTransform.scale = scale;
  gTransform.x = (pw - (minX + maxX) * scale) / 2;
  gTransform.y = (ph - (minY + maxY) * scale) / 2;
  drawGraph();
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  resizeCanvas();
  await loadGraph();
  initLayout();
  drawGraph();
})();
</script>
