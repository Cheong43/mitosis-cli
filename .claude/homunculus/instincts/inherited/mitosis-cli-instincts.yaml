# Mitosis Cli Workflow Add Or Enhance Agent Subagent Or Tool

## Action

Follow the add-or-enhance-agent-subagent-or-tool workflow:
1. Create or update subagent/tool implementation file(s) in src/agent/subagents/ or src/agent/
2. Update types in src/agent/subagents/types.ts or src/agent/planning/types.ts
3. Register or expose the new subagent/tool in src/agent/index.ts
4. Add or update tests in src/agent/*.test.ts
5. Optionally update src/runtime/agent/AgentRuntime.ts or src/runtime/agent/Planner.ts for runtime integration

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: src/agent/subagents/*.ts, src/agent/subagents/types.ts, src/agent/planning/types.ts

